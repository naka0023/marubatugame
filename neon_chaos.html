<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEON OVERDRIVE - MULTI MIX</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #030307;
            color: #fff;
            font-family: 'Courier New', Courier, monospace, sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 480px;
            max-height: 850px;
            background: #05050d;
            box-shadow: 0 0 50px rgba(255, 0, 120, 0.3);
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* HUD */
        .hud {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            font-size: 14px;
            font-weight: bold;
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc;
            pointer-events: none;
            z-index: 5;
        }
        #hud-high { color: #ff0055; text-shadow: 0 0 10px #ff0055; }
        #hud-level {
            position: absolute;
            top: 45px;
            left: 20px;
            font-size: 12px;
            color: #ffcc00;
            text-shadow: 0 0 8px #ffcc00;
        }
        #hud-lives {
            position: absolute;
            top: 45px;
            right: 20px;
            font-size: 12px;
            color: #ff0055;
            text-shadow: 0 0 8px #ff0055;
        }
        
        /* オーバーレイ */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 3, 7, 0.93);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 25px;
            text-align: center;
        }
        .hidden { display: none !important; }
        h1 {
            font-size: 30px;
            color: #ff0055;
            text-shadow: 0 0 20px #ff0055, 0 0 40px #ff0055;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .subtitle {
            font-size: 11px;
            color: #888;
            margin-bottom: 25px;
            letter-spacing: 4px;
        }
        .instruction {
            font-size: 12px;
            color: #00ffcc;
            text-shadow: 0 0 8px rgba(0,255,204,0.3);
            line-height: 1.6;
            margin-bottom: 30px;
            text-align: left;
            background: rgba(255,255,255,0.02);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(0,255,204,0.15);
        }
        .score-display {
            font-size: 22px;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
        }
        .high-shout {
            color: #ffcc00 !important;
            text-shadow: 0 0 15px #ffcc00 !important;
            animation: blink 0.8s infinite alternate;
        }
        @keyframes blink { 0% { opacity: 0.6; } 100% { opacity: 1; } }
        .btn {
            background: transparent;
            border: 2px solid #00ffcc;
            color: #00ffcc;
            padding: 14px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            text-shadow: 0 0 10px #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
            letter-spacing: 1px;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: #00ffcc; color: #030307; box-shadow: 0 0 25px #00ffcc; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="hud">
            <div id="hud-score">TIME: 0.00s</div>
            <div id="hud-high">BEST: 0.00s</div>
            <div id="hud-level">DENSITY: LV.1</div>
            <div id="hud-lives">LIVES: ❤️ × 3</div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="screen-start" class="overlay">
            <h1>NEON MULTI-MIX</h1>
            <div class="subtitle">~ COGNITIVE OVERLOAD ~</div>
            <div class="instruction">
                【時間経過による高密度混在システム】<br><br>
                ⏱️ <b>0s〜</b> : トラップが単体で出現（小手調べ）<br>
                ⏱️ <b>15s〜</b>: 障害物の密度が上昇、2種類が混ざり始める<br>
                ⚠️ <b>30s〜</b>: <b>カオス化。</b>シャッターの奥にプロペラが重なり、メテオが同時に飛来！<br>
                💀 <b>60s〜</b>: 四方八方トラップだらけの弾幕地獄。
            </div>
            
            <div style="display: flex; gap: 15px; width: 100%; justify-content: center;">
                <button id="btn-normal" class="btn" style="font-size: 14px; padding: 12px 20px; flex: 1; line-height: 1.4;" onclick="handleStartButton('NORMAL')">NORMAL RUN<br><span style="font-size: 10px; font-weight: normal; opacity: 0.8;">LIFE: 3 (NO LIMIT)</span></button>
                <button id="btn-sudden" class="btn" style="font-size: 14px; padding: 12px 20px; flex: 1; line-height: 1.4; border-color: #ff0055; color: #ff0055; box-shadow: 0 0 15px rgba(255, 0, 85, 0.2); text-shadow: 0 0 10px #ff0055;" onclick="handleStartButton('SUDDEN')">SUDDEN RUN<br><span style="font-size: 10px; font-weight: normal; opacity: 0.8;">LIFE: 1</span></button>
            </div>
        </div>

        <div id="screen-gameover" class="overlay hidden">
            <h1 style="color: #ff0055; text-shadow: 0 0 20px #ff0055;">DESTROYED</h1>
            <div class="subtitle" id="fail-reason">~ REASON ~</div>
            <div class="score-display" id="res-score">SCORE: 0.00s</div>
            <div class="score-display" id="res-high" style="font-size: 16px; color: #aaa;">BEST: 0.00s</div>
            
            <div style="display: flex; gap: 15px; width: 100%; justify-content: center; margin-top: 15px;">
                <button class="btn" style="font-size: 15px; padding: 12px 25px; flex: 1;" onclick="handleStartButton()">TRY AGAIN</button>
                <button class="btn" style="font-size: 15px; padding: 12px 25px; flex: 1; border-color: #888; color: #888; text-shadow: 0 0 10px #888; box-shadow: 0 0 15px rgba(136,136,136,0.2);" onclick="handleBackButton()">TITLE</button>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const hudScore = document.getElementById('hud-score');
        const hudHigh = document.getElementById('hud-high');
        const hudLevel = document.getElementById('hud-level');
        const hudLives = document.getElementById('hud-lives');
        const screenStart = document.getElementById('screen-start');
        const screenGameover = document.getElementById('screen-gameover');
        const failReasonText = document.getElementById('fail-reason');
        const resScore = document.getElementById('res-score');
        const resHigh = document.getElementById('res-high');

        let gameState = 'INIT'; 
        let cameraX = 0;
        let gameStartTime = 0;
        let survivalTime = 0;

        // モード別ハイスコア管理
        let highScoreNormal = parseFloat(localStorage.getItem('neon_multimix_high_normal')) || 0;
        let highScoreSudden = parseFloat(localStorage.getItem('neon_multimix_high_sudden')) || 0;

        let gameMode = 'NORMAL'; 
        let lastSelectedMode = 'NORMAL';
        let lives = 3;
        let isInvincible = false;
        let invincibleUntil = 0;
        let shakeEndTime = 0;

        // 回復・演出用変数
        let lastHeartSpawnTime = 0;
        let particles = [];
        let flashAlpha = 0;
        let flashColorStr = '#00ff55';
        let dyingEndTime = 0;
        let pendingReason = '';

        // 自機（棒）
        let playerX = 0, playerY = 0;
        const rodLength = 28; 

        // 障害物
        let obstacles = [];
        let nextSpawnX = 600; 

        // 操作用
        let isTouching = false;
        let baseTouchX = 0, baseTouchY = 0;
        let basePlayerX = 0, basePlayerY = 0;

        // --------------------------------------------------
        // 🎵 オーディオシステム（Web Audio API シンセサイザー）
        // --------------------------------------------------
        let audioCtx = null;
        let bgmTimer = null;
        let bgmStep = 0;
        let nextNoteTime = 0;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            startBGM();
        }

        function startBGM() {
            if (bgmTimer) clearTimeout(bgmTimer);
            nextNoteTime = audioCtx.currentTime;
            bgmStep = 0;

            // テクノ風のベースライン (Aマイナーコード進行)
            const baseSeq = [55, 55, 65, 55, 73, 55, 65, 82, 55, 55, 98, 98, 82, 73, 65, 55];
            // 後半のカオス用裏メロディ（30秒以降）
            const leadSeq = [220, 0, 261, 0, 293, 329, 392, 0, 329, 0, 293, 0, 261, 220, 0, 0];

            function scheduler() {
                while (nextNoteTime < audioCtx.currentTime + 0.1) {
                    let stepDuration = 0.14; 

                    if (gameState === 'PLAYING') {
                        // 【ギミック】時間経過（難易度）に合わせてBGMがどんどん加速！
                        let difficulty = Math.min(1.0, survivalTime / 100);
                        stepDuration = 0.14 - (difficulty * 0.05); 

                        // ベース音のスケジューリング
                        let freq = baseSeq[bgmStep % baseSeq.length];
                        if (freq > 0) {
                            let osc = audioCtx.createOscillator();
                            let gain = audioCtx.createGain();
                            osc.type = 'sawtooth'; // ギザギザしたサイバーな音
                            osc.frequency.setValueAtTime(freq, nextNoteTime);
                            
                            gain.gain.setValueAtTime(0.04, nextNoteTime);
                            gain.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + stepDuration * 0.9);
                            
                            osc.connect(gain);
                            gain.connect(audioCtx.destination);
                            osc.start(nextNoteTime);
                            osc.stop(nextNoteTime + stepDuration);
                        }

                        // 【ギミック】25秒以上生き残ると焦燥感を煽る高速ハイピッチメロディが重なる
                        if (survivalTime >= 25) {
                            let leadFreq = leadSeq[bgmStep % leadSeq.length];
                            if (leadFreq > 0) {
                                let oscL = audioCtx.createOscillator();
                                let gainL = audioCtx.createGain();
                                oscL.type = 'square'; // ピコピコした矩形波
                                oscL.frequency.setValueAtTime(leadFreq * 1.5, nextNoteTime);
                                
                                gainL.gain.setValueAtTime(0.015, nextNoteTime);
                                gainL.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + stepDuration * 1.5);
                                
                                oscL.connect(gainL);
                                gainL.connect(audioCtx.destination);
                                oscL.start(nextNoteTime);
                                oscL.stop(nextNoteTime + stepDuration * 1.5);
                            }
                        }
                    } else {
                        // メニュー・ゲームオーバー画面：ゆったりしたミステリアスな旋律
                        stepDuration = 0.25;
                        let titleSeq = [110, 0, 130, 0, 123, 0, 98, 0];
                        let freq = titleSeq[bgmStep % titleSeq.length];
                        if (freq > 0) {
                            let osc = audioCtx.createOscillator();
                            let gain = audioCtx.createGain();
                            osc.type = 'triangle';
                            osc.frequency.setValueAtTime(freq, nextNoteTime);
                            
                            gain.gain.setValueAtTime(0.06, nextNoteTime);
                            gain.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + 0.2);
                            
                            osc.connect(gain);
                            gain.connect(audioCtx.destination);
                            osc.start(nextNoteTime);
                            osc.stop(nextNoteTime + 0.2);
                        }
                    }
                    nextNoteTime += stepDuration;
                    bgmStep++;
                }
                bgmTimer = setTimeout(scheduler, 25);
            }
            scheduler();
        }

        function playSE(type) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;

            if (type === 'select') {
                // ボタンクリック：小気味よい高音
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(500, now);
                osc.frequency.exponentialRampToValueAtTime(1000, now + 0.06);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.06);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.06);
            } 
            else if (type === 'hit') {
                // 被弾（ライフ減少）：鈍い衝撃音
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(160, now);
                osc.frequency.linearRampToValueAtTime(40, now + 0.15);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.15);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.15);
            } 
            else if (type === 'heal') {
                // ハート回収：アルペジオ風の上昇きらきら音
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.setValueAtTime(660, now + 0.04);
                osc.frequency.setValueAtTime(880, now + 0.08);
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.16);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.16);
            } 
            else if (type === 'death') {
                // 完全破壊（ゲームオーバー）：激しい「ガシャーン！」というガラス破壊音
                const now = audioCtx.currentTime;

                // 1. 【ドシャッ！】根幹となる激しい衝撃音（全帯域フルパワー・ノイズ）
                // フィルターを通さない生のノイズを、最初の一瞬（0.2秒）だけ大音量で炸裂させます
                const bufSize1 = audioCtx.sampleRate * 0.2; 
                const buf1 = audioCtx.createBuffer(1, bufSize1, audioCtx.sampleRate);
                const data1 = buf1.getChannelData(0);
                for (let i = 0; i < bufSize1; i++) data1[i] = Math.random() * 2 - 1;
                const noise1 = audioCtx.createBufferSource();
                noise1.buffer = buf1;

                const gain1 = audioCtx.createGain();
                gain1.gain.setValueAtTime(0.6, now); // 音量を一気に引き上げ
                gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.2);

                noise1.connect(gain1); gain1.connect(audioCtx.destination);
                noise1.start(now); noise1.stop(now + 0.2);

                // 2. 【シャーーーン！】豪快に飛び散る大量の破片（ミドルハイパス・ノイズ）
                // フィルターの基準を少し下げて、ガラスがぶつかり合う「ガシャガシャ」した帯域を強調
                const bufSize2 = audioCtx.sampleRate * 0.45;
                const buf2 = audioCtx.createBuffer(1, bufSize2, audioCtx.sampleRate);
                const data2 = buf2.getChannelData(0);
                for (let i = 0; i < bufSize2; i++) data2[i] = Math.random() * 2 - 1;
                const noise2 = audioCtx.createBufferSource();
                noise2.buffer = buf2;

                const filter2 = audioCtx.createBiquadFilter();
                filter2.type = 'highpass';
                filter2.frequency.setValueAtTime(2200, now); // 2200Hzまで下げて厚みを出す

                const gain2 = audioCtx.createGain();
                gain2.gain.setValueAtTime(0.45, now);
                gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.45);

                noise2.connect(filter2); filter2.connect(gain2); gain2.connect(audioCtx.destination);
                noise2.start(now); noise2.stop(now + 0.45);

                // 3. 【ガシッ！】衝撃の瞬間を補強する硬い打撃音（低音のこぎり波）
                // おならにならない超ショート寸断（0.06秒）ののこぎり波で、破壊の「芯」を作ります
                const osc3 = audioCtx.createOscillator();
                const gain3 = audioCtx.createGain();
                osc3.type = 'sawtooth';
                osc3.frequency.setValueAtTime(380, now);
                osc3.frequency.linearRampToValueAtTime(120, now + 0.06);

                gain3.gain.setValueAtTime(0.4, now);
                gain3.gain.exponentialRampToValueAtTime(0.001, now + 0.06);

                osc3.connect(gain3); gain3.connect(audioCtx.destination);
                osc3.start(now); osc3.stop(now + 0.06);

                // 4. 【キーン…】複雑に響くガラスの金属的な余韻（不協和音サイン波×3）
                // 3つの異なる高音を同時に鳴らし、よりリアルで冷たい余韻を残します
                const frequencies = [3200, 4150, 4900];
                frequencies.forEach((freq) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now);
                    // わずかにピッチを落としながら消えていくことでリアルさを演出
                    osc.frequency.linearRampToValueAtTime(freq - 150, now + 0.6);

                    gain.gain.setValueAtTime(0.12, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);

                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now); osc.stop(now + 0.6);
                });
            }
        }

        // 音声呼び出し用ラッパー
        function handleStartButton(mode) {
            initAudio();
            playSE('select');
            startGame(mode);
        }
        function handleBackButton() {
            playSE('select');
            backToTitle();
        }

        // --------------------------------------------------
        // メニューボタンと最高スコアの初期化表示
        // --------------------------------------------------
        function updateMenuButtons() {
            document.getElementById('btn-normal').innerHTML = `NORMAL RUN<br><span style="font-size: 10px; font-weight: normal; opacity: 0.8;">LIFE: 3 (NO LIMIT)<br>BEST: ${highScoreNormal.toFixed(2)}s</span>`;
            document.getElementById('btn-sudden').innerHTML = `SUDDEN RUN<br><span style="font-size: 10px; font-weight: normal; opacity: 0.8;">LIFE: 1<br>BEST: ${highScoreSudden.toFixed(2)}s</span>`;
        }
        function updateHighScoreDisplay() {
            let currentBest = lastSelectedMode === 'NORMAL' ? highScoreNormal : highScoreSudden;
            hudHigh.textContent = `BEST: ${currentBest.toFixed(2)}s`;
        }
        updateMenuButtons();
        updateHighScoreDisplay();

        function resizeCanvas() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            if (gameState !== 'PLAYING' && gameState !== 'DYING') {
                playerX = canvas.width * 0.25;
                playerY = canvas.height * 0.5;
            }
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --------------------------------------------------
        // コース地形生成
        // --------------------------------------------------
        function getTunnel(x, currentSurvivalTime) {
            const h = canvas.height;
            const difficulty = Math.min(1.0, currentSurvivalTime / 100);

            if (x < 400) return { top: h * 0.2, bottom: h * 0.8 };

            const amp1 = h * (0.08 + difficulty * 0.04);
            const amp2 = h * (0.04 + difficulty * 0.03);
            let midY = h * 0.5 + Math.sin(x * 0.002) * amp1 + Math.cos(x * 0.001) * amp2;

            const startWidth = h * 0.52;
            const minWidth = rodLength * 2.3; 
            const currentWidth = startWidth - (startWidth - minWidth) * difficulty;

            return { top: midY - currentWidth / 2, bottom: midY + currentWidth / 2 };
        }

        // --------------------------------------------------
        // トラップ生成アルゴリズム
        // --------------------------------------------------
        function generateGimmickUnit(targetX, chosenType) {
            if (chosenType === 'shutter') {
                return {
                    id: Math.random(), x: targetX, type: 'shutter', param: Math.random() * Math.PI,
                    safeRatio: 0.25 + Math.random() * 0.5, color: '#ffcc00'
                };
            } else if (chosenType === 'propeller') {
                return {
                    id: Math.random(), x: targetX, type: 'propeller', param: Math.random() * Math.PI,
                    dir: Math.random() > 0.5 ? 1 : -1, color: '#ff3333'
                };
            } else if (chosenType === 'bouncer') {
                return {
                    id: Math.random(), x: targetX, type: 'bouncer', param: Math.random() * 2,
                    color: '#cc00ff', radius: 11
                };
            } else if (chosenType === 'meteor') {
                return {
                    id: Math.random(), x: targetX + 150, y: playerY + (Math.random() * 120 - 60),
                    type: 'meteor', vx: -(5.0 + Math.min(1.0, survivalTime/100) * 5), radius: 8, color: '#ffffff'
                };
            }
            return null;
        }

        function spawnObstacleCluster() {
            let maxSimultaneous = 1; 
            let lvText = "LV.1: SINGLE";

            if (survivalTime >= 60) {
                maxSimultaneous = 4; 
                lvText = "LV.4: APOCALYPSE";
            } else if (survivalTime >= 30) {
                maxSimultaneous = 3; 
                lvText = "LV.3: CHAOTIC";
            } else if (survivalTime >= 15) {
                maxSimultaneous = 2; 
                lvText = "LV.2: DUAL-MIX";
            }
            hudLevel.textContent = `DENSITY: ${lvText}`;

            if (gameMode === 'NORMAL' && survivalTime - lastHeartSpawnTime >= 10) {
                obstacles.push({
                    id: Math.random(),
                    x: nextSpawnX,
                    y: null, 
                    type: 'heart',
                    param: 0,
                    color: '#00ff55'
                });
                lastHeartSpawnTime = survivalTime;
                nextSpawnX += 180; 
            }

            let availableTypes = ['shutter', 'propeller', 'bouncer', 'meteor'];
            availableTypes.sort(() => Math.random() - 0.5);
            let activeCount = Math.min(maxSimultaneous, availableTypes.length);

            for (let i = 0; i < activeCount; i++) {
                let microOffset = (i * (40 + Math.random() * 40)) - 30;
                let unit = generateGimmickUnit(nextSpawnX + microOffset, availableTypes[i]);
                if (unit) obstacles.push(unit);
            }

            const difficulty = Math.min(1.0, survivalTime / 100);
            const baseInterval = 340 - (difficulty * 120); 
            nextSpawnX += baseInterval;
        }

        // --------------------------------------------------
        // 衝突判定
        // --------------------------------------------------
        function checkLineCircle(px, rTop, rBot, cx, cy, r) {
            if (cx + r < px || cx - r > px) return false;
            let closestY = Math.max(rTop, Math.min(cy, rBot));
            return ((px - cx) ** 2 + (closestY - cy) ** 2) < r ** 2;
        }

        function checkLineLine(px, rTop, rBot, x1, y1, x2, y2) {
            let minX = Math.min(x1, x2), maxX = Math.max(x1, x2);
            if (px < minX || px > maxX) return false;
            if (x1 === x2) {
                return px === x1 && Math.max(rTop, Math.min(y1, y2)) <= Math.min(rBot, Math.max(y1, y2));
            }
            let t = (px - x1) / (x2 - x1);
            let intersectY = y1 + t * (y2 - y1);
            return intersectY >= rTop && intersectY <= rBot;
        }

        // --------------------------------------------------
        // 特殊エフェクト生成（パーティクル）
        // --------------------------------------------------
        function createExplosionParticles(x, y) {
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x: x, y: y + (Math.random() - 0.5) * rodLength,
                    vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8,
                    length: 6 + Math.random() * 10, angle: Math.random() * Math.PI * 2,
                    vAngle: (Math.random() - 0.5) * 0.3, color: '#00ffcc', alpha: 1,
                    decay: 0.01 + Math.random() * 0.01, type: 'line'
                });
            }
            for (let i = 0; i < 40; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = 2 + Math.random() * 7;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                    size: 2 + Math.random() * 3, color: Math.random() > 0.4 ? '#00ffcc' : '#ff0055',
                    alpha: 1, decay: 0.01 + Math.random() * 0.015, type: 'spark'
                });
            }
        }

        function createRecoveryParticles(x, y) {
            for (let i = 0; i < 25; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = 1.5 + Math.random() * 4;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                    size: 1.5 + Math.random() * 2.5, color: '#00ff55', alpha: 1,
                    decay: 0.02 + Math.random() * 0.02, type: 'spark'
                });
            }
        }

        // --------------------------------------------------
        // コアシステム
        // --------------------------------------------------
        function updateLivesHUD() {
            if (gameMode === 'SUDDEN') {
                hudLives.textContent = 'LIFE: 💀 SUDDEN';
            } else {
                hudLives.textContent = `LIVES: ❤️ × ${lives}`;
            }
        }

        function startGame(mode) {
            if (mode) lastSelectedMode = mode;
            gameMode = lastSelectedMode;

            cameraX = 0; survivalTime = 0;
            playerX = canvas.width * 0.25; playerY = canvas.height * 0.5;
            obstacles = [];
            particles = [];
            nextSpawnX = cameraX + canvas.width + 60; 
            gameState = 'PLAYING';
            gameStartTime = performance.now();

            lives = gameMode === 'NORMAL' ? 3 : 1;
            isInvincible = false;
            invincibleUntil = 0;
            shakeEndTime = 0;
            lastHeartSpawnTime = 0;
            flashAlpha = 0;

            updateLivesHUD();
            updateHighScoreDisplay();

            screenStart.classList.add('hidden');
            screenGameover.classList.add('hidden');
            resHigh.classList.remove('high-shout');
        }

        function handleHit(reason) {
            shakeEndTime = performance.now() + 400;

            if (gameMode === 'SUDDEN') {
                startDyingSequence(reason);
            } else {
                lives--;
                updateLivesHUD();
                if (lives <= 0) {
                    startDyingSequence(reason);
                } else {
                    playSE('hit'); // ダメージSE
                    isInvincible = true;
                    invincibleUntil = performance.now() + 2000;
                    flashAlpha = 0.25;
                    flashColorStr = 'rgba(255, 0, 85, 0.4)';
                }
            }
        }

        function startDyingSequence(reason) {
            gameState = 'DYING';
            pendingReason = reason;
            dyingEndTime = performance.now() + 1000;
            createExplosionParticles(playerX, playerY);
            playSE('death'); // 爆発・死亡SE
            flashAlpha = 0.5;
            flashColorStr = 'rgba(255, 0, 85, 0.6)';
        }

        function gameOver(reason) {
            gameState = 'GAMEOVER';
            failReasonText.textContent = `~ ${reason} ~`;

            let isNewHigh = false;
            if (gameMode === 'NORMAL') {
                if (survivalTime > highScoreNormal) {
                    highScoreNormal = survivalTime;
                    localStorage.setItem('neon_multimix_high_normal', highScoreNormal.toString());
                    isNewHigh = true;
                }
            } else {
                if (survivalTime > highScoreSudden) {
                    highScoreSudden = survivalTime;
                    localStorage.setItem('neon_multimix_high_sudden', highScoreSudden.toString());
                    isNewHigh = true;
                }
            }

            resScore.textContent = `SCORE: ${survivalTime.toFixed(2)}s`;
            let currentBest = gameMode === 'NORMAL' ? highScoreNormal : highScoreSudden;
            if (isNewHigh) {
                resHigh.textContent = `NEW BEST!! 👑`; resHigh.classList.add('high-shout');
            } else {
                resHigh.textContent = `BEST: ${currentBest.toFixed(2)}s`;
            }
            
            updateHighScoreDisplay();
            screenGameover.classList.remove('hidden');
        }

        function backToTitle() {
            gameState = 'INIT';
            screenGameover.classList.add('hidden');
            screenStart.classList.remove('hidden');
            updateMenuButtons();
            updateHighScoreDisplay();
        }

        // 相対スライド操作
        function handleStart(clientX, clientY) {
            if (gameState !== 'PLAYING') return;
            const rect = canvas.getBoundingClientRect();
            baseTouchX = clientX - rect.left; baseTouchY = clientY - rect.top;
            basePlayerX = playerX; basePlayerY = playerY;
            isTouching = true;
        }
        function handleMove(clientX, clientY) {
            if (!isTouching || gameState !== 'PLAYING') return;
            const rect = canvas.getBoundingClientRect();
            playerX = Math.max(20, Math.min(canvas.width - 20, basePlayerX + ((clientX - rect.left) - baseTouchX)));
            playerY = Math.max(rodLength, Math.min(canvas.height - rodLength, basePlayerY + ((clientY - rect.top) - baseTouchY)));
        }

        canvas.addEventListener('touchstart', (e) => { if(e.touches.length > 0) handleStart(e.touches[0].clientX, e.touches[0].clientY); }, {passive: true});
        canvas.addEventListener('touchmove', (e) => { if(e.touches.length > 0) handleMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive: true});
        canvas.addEventListener('touchend', () => isTouching = false);
        canvas.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', () => isTouching = false);

        // --------------------------------------------------
        // メイン描画・演算ループ
        // --------------------------------------------------
        function update(timestamp) {
            const difficulty = Math.min(1.0, survivalTime / 100);
            const scrollSpeed = 3.2 + (2.5 * difficulty);

            if (gameState === 'PLAYING') {
                survivalTime = (timestamp - gameStartTime) / 1000;
                hudScore.textContent = `TIME: ${survivalTime.toFixed(2)}s`;
                cameraX += scrollSpeed;

                if (cameraX + canvas.width > nextSpawnX) spawnObstacleCluster();
            } else if (gameState === 'DYING') {
                if (timestamp > dyingEndTime) {
                    gameOver(pendingReason);
                }
            }

            if (isInvincible && timestamp > invincibleUntil) {
                isInvincible = false;
            }

            let shakeX = 0, shakeY = 0;
            if (timestamp < shakeEndTime) {
                const intensity = ((shakeEndTime - timestamp) / 400) * 12; 
                shakeX = (Math.random() - 0.5) * intensity;
                shakeY = (Math.random() - 0.5) * intensity;
            }

            ctx.fillStyle = '#030308';
            ctx.fillRect(-20, -20, canvas.width + 40, canvas.height + 40);

            ctx.save();
            ctx.translate(shakeX, shakeY);

            // 背景
            ctx.strokeStyle = 'rgba(255, 0, 120, 0.02)'; ctx.lineWidth = 1;
            let gridOffset = cameraX % 40;
            for (let x = -gridOffset; x < canvas.width; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
            for (let y = 0; y < canvas.height; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }

            // 地形
            const step = 10;
            const tunnelPoints = [];
            for (let sx = 0; sx <= canvas.width; sx += step) { tunnelPoints.push(getTunnel(cameraX + sx, survivalTime)); }

            ctx.fillStyle = '#0e0413'; ctx.shadowColor = '#ff0055'; ctx.shadowBlur = 10; ctx.strokeStyle = '#ff0055'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(0, 0); tunnelPoints.forEach((p, i) => ctx.lineTo(i * step, p.top)); ctx.lineTo(canvas.width, 0); ctx.closePath(); ctx.fill();
            ctx.beginPath(); tunnelPoints.forEach((p, i) => ctx.lineTo(i * step, p.top)); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, canvas.height); tunnelPoints.forEach((p, i) => ctx.lineTo(i * step, p.bottom)); ctx.lineTo(canvas.width, canvas.height); ctx.closePath(); ctx.fill();
            ctx.beginPath(); tunnelPoints.forEach((p, i) => ctx.lineTo(i * step, p.bottom)); ctx.stroke();

            let rodTopY = playerY - (rodLength / 2);
            let rodBottomY = playerY + (rodLength / 2);

            // 外壁判定
            if (gameState === 'PLAYING' && !isInvincible) {
                let currentTunnel = getTunnel(cameraX + playerX, survivalTime);
                if (rodTopY <= currentTunnel.top || rodBottomY >= currentTunnel.bottom) {
                    handleHit('外壁ネオンに衝突！');
                }
            }

            // --- 障害物・アイテム演算 ---
            const speedFactor = 1.0 + (difficulty * 1.4);

            obstacles = obstacles.filter(obs => {
                let screenX = obs.x - cameraX;
                if (screenX < -200) return false; 

                let tunnel = getTunnel(obs.x, survivalTime);
                let midY = (tunnel.top + tunnel.bottom) / 2;
                let tunnelHeight = tunnel.bottom - tunnel.top;

                if (gameState === 'PLAYING') {
                    obs.param += 0.03 * speedFactor;
                }

                // 1. シャッター
                if (obs.type === 'shutter') {
                    let targetCenterY = tunnel.top + (tunnelHeight * obs.safeRatio);
                    let safeGap = rodLength * 1.6; 
                    let openProgress = (Math.sin(obs.param) + 1) / 2;
                    let currentGap = safeGap + (tunnelHeight - safeGap) * (1 - openProgress);
                    let topBladeBottom = targetCenterY - (currentGap / 2);
                    let bottomBladeTop = targetCenterY + (currentGap / 2);

                    ctx.shadowColor = obs.color; ctx.strokeStyle = obs.color; ctx.lineWidth = 5;
                    ctx.beginPath(); ctx.moveTo(screenX, tunnel.top); ctx.lineTo(screenX, topBladeBottom); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(screenX, tunnel.bottom); ctx.lineTo(screenX, bottomBladeTop); ctx.stroke();

                    if (gameState === 'PLAYING' && !isInvincible && Math.abs(playerX - screenX) < 5) {
                        if (rodTopY <= topBladeBottom || rodBottomY >= bottomBladeTop) {
                            handleHit('可変シャッターに圧潰！');
                        }
                    }
                } 
                // 2. バウンサー
                else if (obs.type === 'bouncer') {
                    let bounce = (Math.sin(obs.param * 1.4) + 1) / 2;
                    let radius = obs.radius;
                    let minY = tunnel.top + radius + 4;
                    let maxY = tunnel.bottom - radius - 4;
                    let currentY = minY + (maxY - minY) * bounce;

                    ctx.shadowColor = obs.color; ctx.fillStyle = obs.color;
                    ctx.beginPath(); ctx.arc(screenX, currentY, radius, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(screenX, currentY, radius * 0.4, 0, Math.PI * 2); ctx.fill();

                    if (gameState === 'PLAYING' && !isInvincible && checkLineCircle(playerX, rodTopY, rodBottomY, screenX, currentY, radius)) {
                        handleHit('パルスバウンサーに激突！');
                    }
                } 
                // 3. プロペラ
                else if (obs.type === 'propeller') {
                    let angle = obs.param * obs.dir;
                    let bladeLength = tunnelHeight * 0.34;

                    ctx.shadowColor = obs.color; ctx.strokeStyle = obs.color; ctx.lineWidth = 4;
                    let isPropellerHit = false;
                    for (let i = 0; i < 3; i++) {
                        let bAngle = angle + (i * Math.PI * 2 / 3);
                        let bx = screenX + Math.cos(bAngle) * bladeLength;
                        let by = midY + Math.sin(bAngle) * bladeLength;
                        ctx.beginPath(); ctx.moveTo(screenX, midY); ctx.lineTo(bx, by); ctx.stroke();

                        if (gameState === 'PLAYING' && !isInvincible && checkLineLine(playerX, rodTopY, rodBottomY, screenX, midY, bx, by)) {
                            isPropellerHit = true;
                        }
                    }
                    if (isPropellerHit) handleHit('高速プロペラに接触！');
                    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(screenX, midY, 4, 0, Math.PI * 2); ctx.fill();
                } 
                // 4. メテオ
                else if (obs.type === 'meteor') {
                    if (gameState === 'PLAYING') obs.x += obs.vx; 
                    ctx.shadowColor = obs.color; ctx.shadowBlur = 10; ctx.fillStyle = obs.color;
                    ctx.beginPath(); ctx.arc(screenX, obs.y, obs.radius, 0, Math.PI * 2); ctx.fill();

                    if (gameState === 'PLAYING' && !isInvincible && checkLineCircle(playerX, rodTopY, rodBottomY, screenX, obs.y, obs.radius)) {
                        handleHit('飛来メテオに撃墜された！');
                    }
                }
                // 5. 回復ハート
                else if (obs.type === 'heart') {
                    if (obs.y === undefined || obs.y === null) {
                        obs.y = midY;
                    }

                    let diffX = playerX - screenX;
                    let diffY = playerY - obs.y;
                    let distance = Math.sqrt(diffX * diffX + diffY * diffY);

                    if (gameState === 'PLAYING' && distance < 180) {
                        let playerWorldX = cameraX + playerX;
                        obs.x += (playerWorldX - obs.x) * 0.24; 
                        obs.y += (playerY - obs.y) * 0.24;
                        screenX = obs.x - cameraX;
                    } else {
                        let targetY = midY + Math.sin(timestamp * 0.005) * 15;
                        obs.y += (targetY - obs.y) * 0.1;
                    }
                    let itemY = obs.y;

                    ctx.shadowColor = obs.color; ctx.shadowBlur = 15; ctx.strokeStyle = obs.color; ctx.lineWidth = 3;
                    
                    ctx.beginPath();
                    ctx.moveTo(screenX, itemY - 4);
                    ctx.bezierCurveTo(screenX - 7, itemY - 12, screenX - 14, itemY - 5, screenX, itemY + 10);
                    ctx.bezierCurveTo(screenX + 14, itemY - 5, screenX + 7, itemY - 12, screenX, itemY - 4);
                    ctx.closePath();
                    ctx.stroke();

                    ctx.fillStyle = 'rgba(0, 255, 85, 0.2)';
                    ctx.fill();

                    if (gameState === 'PLAYING' && checkLineCircle(playerX, rodTopY, rodBottomY, screenX, itemY, 14)) {
                        lives++; 
                        updateLivesHUD();
                        createRecoveryParticles(screenX, itemY);
                        playSE('heal'); // 回復SE
                        flashAlpha = 0.35;
                        flashColorStr = 'rgba(0, 255, 85, 0.4)';
                        return false; 
                    }
                }

                return true;
            });

            // --- 自機描画（修復補完） ---
            if (gameState === 'PLAYING') {
                let showPlayer = true;
                if (isInvincible) {
                    showPlayer = Math.floor(timestamp / 100) % 2 === 0;
                }
                if (showPlayer) {
                    ctx.shadowColor = '#00ffcc'; ctx.shadowBlur = 15; 
                    ctx.strokeStyle = isInvincible ? 'rgba(0, 255, 204, 0.4)' : '#00ffcc'; 
                    ctx.lineWidth = 5; ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.moveTo(playerX, rodTopY);
                    ctx.lineTo(playerX, rodBottomY);
                    ctx.stroke();
                }
            }

            // --- パーティクル描画・更新 ---
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= p.decay;
                if (p.alpha <= 0) return false;

                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = p.type === 'line' ? 12 : 6;
                ctx.strokeStyle = p.color;
                ctx.fillStyle = p.color;

                if (p.type === 'line') {
                    p.angle += p.vAngle;
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.angle);
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(-p.length / 2, 0);
                    ctx.lineTo(p.length / 2, 0);
                    ctx.stroke();
                } else {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
                return true;
            });

            // --- 全画面フラッシュエフェクト ---
            if (flashAlpha > 0) {
                ctx.fillStyle = flashColorStr;
                ctx.globalAlpha = flashAlpha;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.globalAlpha = 1.0;
                flashAlpha -= 0.015;
            }

            ctx.restore();
            requestAnimationFrame(update);
        }

        // ループの開始
        requestAnimationFrame(update);
    </script>
</body>
</html>
