<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEON OVERDRIVE - MULTI MIX</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #030307;
            color: #fff;
            font-family: 'Courier New', Courier, monospace, sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 480px;
            max-height: 850px;
            background: #05050d;
            box-shadow: 0 0 50px rgba(255, 0, 120, 0.3);
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* HUD */
        .hud {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            font-size: 14px;
            font-weight: bold;
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc;
            pointer-events: none;
            z-index: 5;
        }
        #hud-high { color: #ff0055; text-shadow: 0 0 10px #ff0055; }
        #hud-level {
            position: absolute;
            top: 45px;
            left: 20px;
            font-size: 12px;
            color: #ffcc00;
            text-shadow: 0 0 8px #ffcc00;
        }
        
        /* オーバーレイ */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 3, 7, 0.93);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 25px;
            text-align: center;
        }
        .hidden { display: none !important; }
        h1 {
            font-size: 30px;
            color: #ff0055;
            text-shadow: 0 0 20px #ff0055, 0 0 40px #ff0055;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .subtitle {
            font-size: 11px;
            color: #888;
            margin-bottom: 25px;
            letter-spacing: 4px;
        }
        .instruction {
            font-size: 12px;
            color: #00ffcc;
            text-shadow: 0 0 8px rgba(0,255,204,0.3);
            line-height: 1.6;
            margin-bottom: 30px;
            text-align: left;
            background: rgba(255,255,255,0.02);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(0,255,204,0.15);
        }
        .score-display {
            font-size: 22px;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
        }
        .high-shout {
            color: #ffcc00 !important;
            text-shadow: 0 0 15px #ffcc00 !important;
            animation: blink 0.8s infinite alternate;
        }
        @keyframes blink { 0% { opacity: 0.6; } 100% { opacity: 1; } }
        .btn {
            background: transparent;
            border: 2px solid #00ffcc;
            color: #00ffcc;
            padding: 14px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            text-shadow: 0 0 10px #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
            letter-spacing: 1px;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: #00ffcc; color: #030307; box-shadow: 0 0 25px #00ffcc; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="hud">
            <div id="hud-score">TIME: 0.00s</div>
            <div id="hud-high">BEST: 0.00s</div>
            <div id="hud-level">DENSITY: LV.1</div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="screen-start" class="overlay">
            <h1>NEON MULTI-MIX</h1>
            <div class="subtitle">~ COGNITIVE OVERLOAD ~</div>
            <div class="instruction">
                【時間経過による高密度混在システム】<br><br>
                ⏱️ <b>0s〜</b> : トラップが単体で出現（小手調べ）<br>
                ⏱️ <b>15s〜</b>: 障害物の密度が上昇、2種類が混ざり始める<br>
                ⚠️ <b>30s〜</b>: <b>カオス化。</b>シャッターの奥にプロペラが重なり、メテオが同時に飛来！<br>
                💀 <b>60s〜</b>: 四方八方トラップだらけの弾幕地獄。
            </div>
            <button class="btn" onclick="startGame()">START RUN</button>
        </div>

        <div id="screen-gameover" class="overlay hidden">
            <h1 style="color: #ff0055; text-shadow: 0 0 20px #ff0055;">DESTROYED</h1>
            <div class="subtitle" id="fail-reason">~ REASON ~</div>
            <div class="score-display" id="res-score">SCORE: 0.00s</div>
            <div class="score-display" id="res-high" style="font-size: 16px; color: #aaa;">BEST: 0.00s</div>
            <button class="btn" onclick="startGame()">TRY AGAIN</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const hudScore = document.getElementById('hud-score');
        const hudHigh = document.getElementById('hud-high');
        const hudLevel = document.getElementById('hud-level');
        const screenStart = document.getElementById('screen-start');
        const screenGameover = document.getElementById('screen-gameover');
        const failReasonText = document.getElementById('fail-reason');
        const resScore = document.getElementById('res-score');
        const resHigh = document.getElementById('res-high');

        let gameState = 'INIT'; 
        let cameraX = 0;
        let gameStartTime = 0;
        let survivalTime = 0;
        let highScore = parseFloat(localStorage.getItem('neon_multimix_high')) || 0;

        // 自機（棒）
        let playerX = 0, playerY = 0;
        const rodLength = 28; // 密度上昇に伴い、わずかに小さく調整

        // 障害物
        let obstacles = [];
        let nextSpawnX = 600; 

        // 操作用
        let isTouching = false;
        let baseTouchX = 0, baseTouchY = 0;
        let basePlayerX = 0, basePlayerY = 0;

        hudHigh.textContent = `BEST: ${highScore.toFixed(2)}s`;

        function resizeCanvas() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            if (gameState !== 'PLAYING') {
                playerX = canvas.width * 0.25;
                playerY = canvas.height * 0.5;
            }
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --------------------------------------------------
        // コース地形生成
        // --------------------------------------------------
        function getTunnel(x, currentSurvivalTime) {
            const h = canvas.height;
            const difficulty = Math.min(1.0, currentSurvivalTime / 100);

            if (x < 400) return { top: h * 0.2, bottom: h * 0.8 };

            const amp1 = h * (0.08 + difficulty * 0.04);
            const amp2 = h * (0.04 + difficulty * 0.03);
            let midY = h * 0.5 + Math.sin(x * 0.002) * amp1 + Math.cos(x * 0.001) * amp2;

            const startWidth = h * 0.52;
            const minWidth = rodLength * 2.3; // 複数重なるため少し広めのマージン
            const currentWidth = startWidth - (startWidth - minWidth) * difficulty;

            return { top: midY - currentWidth / 2, bottom: midY + currentWidth / 2 };
        }

        // --------------------------------------------------
        // ★新・多層混在型 トラップ生成アルゴリズム
        // --------------------------------------------------
        function generateGimmickUnit(targetX, chosenType) {
            if (chosenType === 'shutter') {
                return {
                    id: Math.random(), x: targetX, type: 'shutter', param: Math.random() * Math.PI,
                    safeRatio: 0.25 + Math.random() * 0.5, color: '#ffcc00'
                };
            } else if (chosenType === 'propeller') {
                return {
                    id: Math.random(), x: targetX, type: 'propeller', param: Math.random() * Math.PI,
                    dir: Math.random() > 0.5 ? 1 : -1, color: '#ff3333'
                };
            } else if (chosenType === 'bouncer') {
                return {
                    id: Math.random(), x: targetX, type: 'bouncer', param: Math.random() * 2,
                    color: '#cc00ff', radius: 11
                };
            } else if (chosenType === 'meteor') {
                return {
                    id: Math.random(), x: targetX + 150, y: playerY + (Math.random() * 120 - 60),
                    type: 'meteor', vx: -(5.0 + Math.min(1.0, survivalTime/100) * 5), radius: 8, color: '#ffffff'
                };
            }
            return null;
        }

        function spawnObstacleCluster() {
            // 時間ごとの同時出現数（密度レベル）の設定
            let maxSimultaneous = 1; // 15秒未満
            let lvText = "LV.1: SINGLE";

            if (survivalTime >= 60) {
                maxSimultaneous = 4; // 60秒以上: 絶望（4種全盛り）
                lvText = "LV.4: APOCALYPSE";
            } else if (survivalTime >= 30) {
                maxSimultaneous = 3; // 30秒以上: カオス（3種類同時）
                lvText = "LV.3: CHAOTIC";
            } else if (survivalTime >= 15) {
                maxSimultaneous = 2; // 15秒以上: 危険（2種類同時）
                lvText = "LV.2: DUAL-MIX";
            }
            hudLevel.textContent = `DENSITY: ${lvText}`;

            // 利用可能な全ギミック
            let availableTypes = ['shutter', 'propeller', 'bouncer', 'meteor'];
            
            // ランダムにシャッフルして、現在の最大出現数だけギミックを選出
            availableTypes.sort(() => Math.random() - 0.5);
            let activeCount = Math.min(maxSimultaneous, availableTypes.length);

            // 選ばれた複数のギミックを「同じX座標付近」に同時に発生させる！
            for (let i = 0; i < activeCount; i++) {
                // まったく同じXだと重なりすぎるので、数px〜数十pxだけわざと前後させて嫌らしさを出す
                let microOffset = (i * (40 + Math.random() * 40)) - 30;
                let unit = generateGimmickUnit(nextSpawnX + microOffset, availableTypes[i]);
                if (unit) obstacles.push(unit);
            }

            // 次の塊（クラスター）が出現するまでの距離
            // 難易度が上がるほど、クラスター間の距離自体も短くなり、切れ目がなくなっていく
            const difficulty = Math.min(1.0, survivalTime / 100);
            const baseInterval = 340 - (difficulty * 120); 
            nextSpawnX += baseInterval;
        }

        // --------------------------------------------------
        // 衝突判定
        // --------------------------------------------------
        function checkLineCircle(px, rTop, rBot, cx, cy, r) {
            if (cx + r < px || cx - r > px) return false;
            let closestY = Math.max(rTop, Math.min(cy, rBot));
            return ((px - cx) ** 2 + (closestY - cy) ** 2) < r ** 2;
        }

        function checkLineLine(px, rTop, rBot, x1, y1, x2, y2) {
            let minX = Math.min(x1, x2), maxX = Math.max(x1, x2);
            if (px < minX || px > maxX) return false;
            if (x1 === x2) {
                return px === x1 && Math.max(rTop, Math.min(y1, y2)) <= Math.min(rBot, Math.max(y1, y2));
            }
            let t = (px - x1) / (x2 - x1);
            let intersectY = y1 + t * (y2 - y1);
            return intersectY >= rTop && intersectY <= rBot;
        }

        // --------------------------------------------------
        // コアシステム
        // --------------------------------------------------
        function startGame() {
            cameraX = 0; survivalTime = 0;
            playerX = canvas.width * 0.25; playerY = canvas.height * 0.5;
            obstacles = [];
            nextSpawnX = cameraX + canvas.width + 60; 
            gameState = 'PLAYING';
            gameStartTime = performance.now();

            screenStart.classList.add('hidden');
            screenGameover.classList.add('hidden');
            resHigh.classList.remove('high-shout');
        }

        function gameOver(reason) {
            gameState = 'GAMEOVER';
            failReasonText.textContent = `~ ${reason} ~`;

            let isNewHigh = false;
            if (survivalTime > highScore) {
                highScore = survivalTime;
                localStorage.setItem('neon_multimix_high', highScore.toString());
                hudHigh.textContent = `BEST: ${highScore.toFixed(2)}s`;
                isNewHigh = true;
            }

            resScore.textContent = `SCORE: ${survivalTime.toFixed(2)}s`;
            if (isNewHigh) {
                resHigh.textContent = `NEW BEST!! 👑`; resHigh.classList.add('high-shout');
            } else {
                resHigh.textContent = `BEST: ${highScore.toFixed(2)}s`;
            }
            screenGameover.classList.remove('hidden');
        }

        // 相対スライド操作
        function handleStart(clientX, clientY) {
            if (gameState !== 'PLAYING') return;
            const rect = canvas.getBoundingClientRect();
            baseTouchX = clientX - rect.left; baseTouchY = clientY - rect.top;
            basePlayerX = playerX; basePlayerY = playerY;
            isTouching = true;
        }
        function handleMove(clientX, clientY) {
            if (!isTouching || gameState !== 'PLAYING') return;
            const rect = canvas.getBoundingClientRect();
            playerX = Math.max(20, Math.min(canvas.width - 20, basePlayerX + ((clientX - rect.left) - baseTouchX)));
            playerY = Math.max(rodLength, Math.min(canvas.height - rodLength, basePlayerY + ((clientY - rect.top) - baseTouchY)));
        }

        canvas.addEventListener('touchstart', (e) => { if(e.touches.length > 0) handleStart(e.touches[0].clientX, e.touches[0].clientY); }, {passive: true});
        canvas.addEventListener('touchmove', (e) => { if(e.touches.length > 0) handleMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive: true});
        canvas.addEventListener('touchend', () => isTouching = false);
        canvas.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', () => isTouching = false);

        // --------------------------------------------------
        // メイン描画・演算
        // --------------------------------------------------
        function update(timestamp) {
            ctx.fillStyle = '#030308';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const difficulty = Math.min(1.0, survivalTime / 100);
            const scrollSpeed = 3.2 + (2.5 * difficulty);

            if (gameState === 'PLAYING') {
                survivalTime = (timestamp - gameStartTime) / 1000;
                hudScore.textContent = `TIME: ${survivalTime.toFixed(2)}s`;
                cameraX += scrollSpeed;

                if (cameraX + canvas.width > nextSpawnX) spawnObstacleCluster();
            }

            // 背景
            ctx.strokeStyle = 'rgba(255, 0, 120, 0.02)'; ctx.lineWidth = 1;
            let gridOffset = cameraX % 40;
            for (let x = -gridOffset; x < canvas.width; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
            for (let y = 0; y < canvas.height; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }

            // 地形
            const step = 10;
            const tunnelPoints = [];
            for (let sx = 0; sx <= canvas.width; sx += step) { tunnelPoints.push(getTunnel(cameraX + sx, survivalTime)); }

            ctx.fillStyle = '#0e0413'; ctx.shadowColor = '#ff0055'; ctx.shadowBlur = 10; ctx.strokeStyle = '#ff0055'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(0, 0); tunnelPoints.forEach((p, i) => ctx.lineTo(i * step, p.top)); ctx.lineTo(canvas.width, 0); ctx.closePath(); ctx.fill();
            ctx.beginPath(); tunnelPoints.forEach((p, i) => ctx.lineTo(i * step, p.top)); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, canvas.height); tunnelPoints.forEach((p, i) => ctx.lineTo(i * step, p.bottom)); ctx.lineTo(canvas.width, canvas.height); ctx.closePath(); ctx.fill();
            ctx.beginPath(); tunnelPoints.forEach((p, i) => ctx.lineTo(i * step, p.bottom)); ctx.stroke();

            // 自機判定
            let rodTopY = playerY - (rodLength / 2);
            let rodBottomY = playerY + (rodLength / 2);

            if (gameState === 'PLAYING') {
                let currentTunnel = getTunnel(cameraX + playerX, survivalTime);
                if (rodTopY <= currentTunnel.top || rodBottomY >= currentTunnel.bottom) {
                    gameOver('外壁ネオンに衝突！');
                }
            }

            // --- 障害物複合演算 ---
            const speedFactor = 1.0 + (difficulty * 1.4);

            obstacles = obstacles.filter(obs => {
                let screenX = obs.x - cameraX;
                if (screenX < -200) return false; 

                let tunnel = getTunnel(obs.x, survivalTime);
                let midY = (tunnel.top + tunnel.bottom) / 2;
                let tunnelHeight = tunnel.bottom - tunnel.top;

                if (gameState === 'PLAYING') {
                    obs.param += 0.03 * speedFactor;
                }

                // 1. シャッター
                if (obs.type === 'shutter') {
                    let targetCenterY = tunnel.top + (tunnelHeight * obs.safeRatio);
                    let safeGap = rodLength * 1.6; 
                    let openProgress = (Math.sin(obs.param) + 1) / 2;
                    let currentGap = safeGap + (tunnelHeight - safeGap) * (1 - openProgress);

                    let topBladeBottom = targetCenterY - (currentGap / 2);
                    let bottomBladeTop = targetCenterY + (currentGap / 2);

                    ctx.shadowColor = obs.color; ctx.strokeStyle = obs.color; ctx.lineWidth = 5;
                    ctx.beginPath(); ctx.moveTo(screenX, tunnel.top); ctx.lineTo(screenX, topBladeBottom); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(screenX, tunnel.bottom); ctx.lineTo(screenX, bottomBladeTop); ctx.stroke();

                    if (gameState === 'PLAYING' && Math.abs(playerX - screenX) < 5) {
                        if (rodTopY <= topBladeBottom || rodBottomY >= bottomBladeTop) {
                            gameOver('可変シャッターに圧潰！');
                        }
                    }
                } 
                // 2. バウンサー
                else if (obs.type === 'bouncer') {
                    let bounce = (Math.sin(obs.param * 1.4) + 1) / 2;
                    let radius = obs.radius;
                    let minY = tunnel.top + radius + 4;
                    let maxY = tunnel.bottom - radius - 4;
                    let currentY = minY + (maxY - minY) * bounce;

                    ctx.shadowColor = obs.color; ctx.fillStyle = obs.color;
                    ctx.beginPath(); ctx.arc(screenX, currentY, radius, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(screenX, currentY, radius * 0.4, 0, Math.PI * 2); ctx.fill();

                    if (gameState === 'PLAYING' && checkLineCircle(playerX, rodTopY, rodBottomY, screenX, currentY, radius)) {
                        gameOver('パルスバウンサーに激突！');
                    }
                } 
                // 3. プロペラ
                else if (obs.type === 'propeller') {
                    let angle = obs.param * obs.dir;
                    let bladeLength = tunnelHeight * 0.34;

                    ctx.shadowColor = obs.color; ctx.strokeStyle = obs.color; ctx.lineWidth = 4;
                    for (let i = 0; i < 3; i++) {
                        let bAngle = angle + (i * Math.PI * 2 / 3);
                        let bx = screenX + Math.cos(bAngle) * bladeLength;
                        let by = midY + Math.sin(bAngle) * bladeLength;

                        ctx.beginPath(); ctx.moveTo(screenX, midY); ctx.lineTo(bx, by); ctx.stroke();

                        if (gameState === 'PLAYING' && checkLineLine(playerX, rodTopY, rodBottomY, screenX, midY, bx, by)) {
                            gameOver('高速プロペラに接触！');
                        }
                    }
                    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(screenX, midY, 4, 0, Math.PI * 2); ctx.fill();
                } 
                // 4. メテオ（飛来弾）
                else if (obs.type === 'meteor') {
                    if (gameState === 'PLAYING') obs.x += obs.vx; 
                    
                    ctx.shadowColor = obs.color; ctx.shadowBlur = 10; ctx.fillStyle = obs.color;
                    ctx.beginPath(); ctx.arc(screenX, obs.y, obs.radius, 0, Math.PI * 2); ctx.fill();

                    if (gameState === 'PLAYING' && checkLineCircle(playerX, rodTopY, rodBottomY, screenX, obs.y, obs.radius)) {
                        gameOver('飛来メテオに撃墜された！');
                    }
                }

                return true;
            });

            // 自機描画
            ctx.shadowColor = '#00ffcc'; ctx.shadowBlur = 15; ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 5; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(playerX, rodTopY); ctx.lineTo(playerX, rodBottomY); ctx.stroke();
            ctx.fillStyle = '#ffffff'; ctx.shadowBlur = 5; ctx.beginPath(); ctx.arc(playerX, playerY, 3, 0, Math.PI * 2); ctx.fill();

            requestAnimationFrame(update);
        }

        requestAnimationFrame(update);
    </script>
</body>
</html>
