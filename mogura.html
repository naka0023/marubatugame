<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100点満点モグラ叩き（リッチリザルト版）</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            background-color: #e2f0d9;
            margin: 0;
            padding: 20px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
            text-shadow: 1px 1px 0 white;
        }
        p {
            margin: 0 0 15px 0;
            color: #7f8c8d;
            font-size: 0.9rem;
        }
        .info-container {
            display: flex;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .score-box { color: #d9534f; }
        
        .btn {
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            background-color: #ff9800;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px #e65100;
            transition: all 0.1s;
        }
        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 0px #e65100;
        }
        .btn:disabled {
            background-color: #ccc;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
        
        /* モグラ叩きの盤面レイアウト */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 140px);
            grid-gap: 15px 25px;
            justify-content: center;
            margin: 20px auto;
        }

        .hole-container {
            width: 140px;
            height: 150px;
            position: relative;
            overflow: hidden;
        }

        .hole-back {
            width: 120px;
            height: 40px;
            background-color: #23150c;
            border-radius: 50%;
            position: absolute;
            bottom: 15px;
            left: 10px;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.7);
        }

        .mole {
            width: 84px;
            height: 90px;
            background-color: #a1887f;
            border-radius: 42px 42px 0 0;
            position: absolute;
            left: 28px;
            bottom: 25px;
            z-index: 2;
            transform: translateY(110px);
            transition: transform 0.12s cubic-bezier(0.175, 0.885, 0.32, 1.2), background-color 0.1s;
            cursor: pointer;
        }

        .mole.gold {
            background-color: #ffd700 !important;
            box-shadow: 0 0 20px #ffea00;
        }
        .mole.gold .nose { background-color: #ffa726; }

        .mole.purple {
            background-color: #8e24aa !important;
            box-shadow: 0 0 10px rgba(142, 36, 170, 0.5);
        }
        .mole.purple .nose { background-color: #ba68c8; }

        .hole-container.up .mole {
            transform: translateY(-15px);
        }

        .mole.whacked {
            background-color: #ff5252 !important;
            box-shadow: none !important;
            transform: translateY(40px) scaleY(0.4) !important;
            transition: transform 0.06s ease-in;
        }
        
        .eye {
            position: absolute;
            width: 6px;
            height: 6px;
            background-color: #212121;
            border-radius: 50%;
            top: 25px;
        }
        .eye.left { left: 24px; }
        .eye.right { right: 24px; }
        
        .mole.whacked .eye {
            background: transparent;
        }
        .mole.whacked .eye::before {
            content: '×';
            position: absolute;
            font-size: 12px;
            font-weight: bold;
            top: -7px;
            left: -3px;
            color: #000;
        }

        .nose {
            position: absolute;
            width: 14px;
            height: 9px;
            background-color: #ff8a80;
            border-radius: 50%;
            top: 35px;
            left: 35px;
        }

        .hole-front {
            width: 120px;
            height: 45px;
            background: linear-gradient(to bottom, #5d4037, #4e342e);
            border-radius: 50%;
            position: absolute;
            bottom: 10px;
            left: 10px;
            z-index: 3;
            border-top: 4px solid #6d4c41;
            box-shadow: 0 5px 6px rgba(0,0,0,0.3);
        }
        
        .hit-text {
            position: absolute;
            font-size: 1.8rem;
            font-weight: bold;
            top: 10px;
            left: 25px;
            width: 90px;
            text-align: center;
            z-index: 4;
            pointer-events: none;
            text-shadow: 2px 2px 0px white;
            animation: popOut 0.4s ease-out forwards;
        }
        @keyframes popOut {
            0% { transform: scale(0.4); opacity: 1; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1) translateY(-35px); opacity: 0; }
        }

        /* 📱 スマホ用レスポンシブ対応 */
        @media (max-width: 480px) {
            body { padding: 10px; }
            h1 { font-size: 1.6rem; }
            .info-container { font-size: 1.4rem; }
            
            .grid {
                grid-template-columns: repeat(3, 95px);
                grid-gap: 10px 15px;
            }
            .hole-container { width: 95px; height: 105px; }
            .hole-back { width: 82px; height: 28px; bottom: 10px; left: 6.5px; }
            .mole { width: 58px; height: 62px; left: 18.5px; bottom: 18px; transform: translateY(80px); }
            .hole-container.up .mole { transform: translateY(-10px); }
            .mole.whacked { transform: translateY(30px) scaleY(0.4) !important; }
            .eye { width: 4px; height: 4px; top: 18px; }
            .eye.left { left: 16px; } .eye.right { right: 16px; }
            .mole.whacked .eye::before { font-size: 10px; top: -6px; left: -2px; }
            .nose { width: 10px; height: 6px; top: 25px; left: 24px; }
            .hole-front { width: 82px; height: 32px; bottom: 5px; left: 6.5px; }
            .hit-text { font-size: 1.3rem; left: 10px; width: 75px; top: 5px; }
        }

        /* 👑 リッチポップアップ（モーダル）のスタイル */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background-color: white;
            padding: 30px 20px;
            border-radius: 25px;
            width: 85%;
            max-width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.25);
            text-align: center;
        }
        .modal-overlay.show .modal-content {
            transform: scale(1);
        }
        .modal-title {
            font-size: 1.6rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .modal-score-label {
            font-size: 1rem;
            color: #7f8c8d;
            margin-top: 15px;
        }
        .modal-score {
            font-size: 3rem;
            font-weight: bold;
            color: #d9534f;
            margin: 5px 0 15px 0;
            text-shadow: 1px 1px 0px rgba(0,0,0,0.1);
        }
        .modal-comment {
            color: #34495e;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 25px;
            white-space: pre-line; /* 改行を有効にする */
        }
    </style>
</head>
<body>

    <h1>🔨 100点満点モグラ叩き 🔨</h1>
    <p>茶色=+5点 | ✨金=+10点 | 💢紫=-5点（スルー！）</p>
    
    <div class="info-container">
        <div class="score-box">スコア: <span id="score">0</span> / <span id="max-score">100</span></div>
    </div>
    
    <button id="start-btn" class="btn" onclick="startGame()">ゲームスタート！</button>

    <div class="grid">
        <div class="hole-container"><div class="hole-back"></div><div class="mole" onclick="whack(this)"><div class="eye left"></div><div class="eye right"></div><div class="nose"></div></div><div class="hole-front"></div></div>
        <div class="hole-container"><div class="hole-back"></div><div class="mole" onclick="whack(this)"><div class="eye left"></div><div class="eye right"></div><div class="nose"></div></div><div class="hole-front"></div></div>
        <div class="hole-container"><div class="hole-back"></div><div class="mole" onclick="whack(this)"><div class="eye left"></div><div class="eye right"></div><div class="nose"></div></div><div class="hole-front"></div></div>
        <div class="hole-container"><div class="hole-back"></div><div class="mole" onclick="whack(this)"><div class="eye left"></div><div class="eye right"></div><div class="nose"></div></div><div class="hole-front"></div></div>
        <div class="hole-container"><div class="hole-back"></div><div class="mole" onclick="whack(this)"><div class="eye left"></div><div class="eye right"></div><div class="nose"></div></div><div class="hole-front"></div></div>
        <div class="hole-container"><div class="hole-back"></div><div class="mole" onclick="whack(this)"><div class="eye left"></div><div class="eye right"></div><div class="nose"></div></div><div class="hole-front"></div></div>
        <div class="hole-container"><div class="hole-back"></div><div class="mole" onclick="whack(this)"><div class="eye left"></div><div class="eye right"></div><div class="nose"></div></div><div class="hole-front"></div></div>
        <div class="hole-container"><div class="hole-back"></div><div class="mole" onclick="whack(this)"><div class="eye left"></div><div class="eye right"></div><div class="nose"></div></div><div class="hole-front"></div></div>
        <div class="hole-container"><div class="hole-back"></div><div class="mole" onclick="whack(this)"><div class="eye left"></div><div class="eye right"></div><div class="nose"></div></div><div class="hole-front"></div></div>
    </div>

    <div id="result-modal" class="modal-overlay">
        <div class="modal-content">
            <div id="modal-title" class="modal-title">🎉 結果発表 🎉</div>
            <div class="modal-score-label">FINAL SCORE</div>
            <div class="modal-score"><span id="final-score">0</span><span style="font-size: 1.5rem; color:#7f8c8d;"> / 100</span></div>
            <div id="modal-comment" class="modal-comment">ここにコメントが入ります</div>
            <button class="btn" onclick="closeModal()">もう一度遊ぶ</button>
        </div>
    </div>

    <script>
        const holes = document.querySelectorAll('.hole-container');
        const scoreDisplay = document.getElementById('score');
        const startBtn = document.getElementById('start-btn');
        const resultModal = document.getElementById('result-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalComment = document.getElementById('modal-comment');
        const finalScore = document.getElementById('final-score');
        
        let score = 0;
        let remainingPoints = 100; 
        let activeMoles = 0;       
        let gameActive = false;
        const MAX_CONCURRENT_MOLES = 3; 

        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        function randomHole() {
            const availableHoles = Array.from(holes).filter(hole => !hole.classList.contains('up'));
            if (availableHoles.length === 0) return null;
            const idx = Math.floor(Math.random() * availableHoles.length);
            return availableHoles[idx];
        }

        function peep() {
            if (!gameActive) return;

            if (remainingPoints <= 0) {
                if (activeMoles === 0) endGame();
                return;
            }

            const hole = randomHole();
            if (!hole) {
                setTimeout(peep, 100);
                return;
            }

            const mole = hole.querySelector('.mole');
            
            let type = 'normal';
            const r = Math.random() * 100;
            
            if (r < 25 && remainingPoints >= 10) {
                type = 'gold';
            } else if (r < 45 && remainingPoints > 15) { 
                type = 'purple'; 
            } else {
                type = 'normal';
            }

            if (type === 'gold' && remainingPoints < 10) type = 'normal';

            if (type === 'normal') remainingPoints -= 5;
            if (type === 'gold') remainingPoints -= 10;

            mole.className = 'mole'; 
            mole.classList.add(type);
            mole.dataset.type = type;

            hole.classList.add('up');
            activeMoles++;
            
            let duration = randomTime(800, 1100);
            if (type === 'gold') duration = randomTime(550, 800);
            if (type === 'purple') duration = randomTime(900, 1300);
            
            const moleTimeout = setTimeout(() => {
                if (hole.classList.contains('up') && !mole.classList.contains('whacked')) {
                    hole.classList.remove('up');
                    activeMoles--;
                    if (gameActive) nextMole();
                }
            }, duration);

            hole.dataset.timeoutId = moleTimeout;
        }

        function nextMole() {
            if (!gameActive) return;
            if (remainingPoints <= 0) {
                if (activeMoles === 0) endGame();
                return;
            }
            setTimeout(peep, randomTime(200, 500));
        }

        function startGame() {
            score = 0;
            remainingPoints = 100;
            activeMoles = 0;
            scoreDisplay.textContent = score;
            gameActive = true;
            startBtn.disabled = true;

            for (let i = 0; i < MAX_CONCURRENT_MOLES; i++) {
                setTimeout(peep, i * 250);
            }
        }

        // 👑 終了処理：ポップアップを生成して表示
        function endGame() {
            if (!gameActive) return;
            gameActive = false;
            
            holes.forEach(hole => {
                clearTimeout(hole.dataset.timeoutId);
                hole.classList.remove('up');
                hole.querySelector('.mole').className = 'mole';
            });
            
            // スコアをポップアップに反映
            finalScore.textContent = score;
            
            // 得点に応じた分岐演出
            if (score === 100) {
                modalTitle.textContent = '👑 PERFECT!!! 👑';
                modalComment.textContent = '神レベルのタップスピード！\n100点満点、文句なしの完全制覇です！🎉';
            } else if (score >= 80) {
                modalTitle.textContent = '✨ GREAT!!! ✨';
                modalComment.textContent = '素晴らしい反射神経！\n満点まであと一歩でした、惜しい！👍';
            } else if (score >= 50) {
                modalTitle.textContent = '👍 NICE TRY 👍';
                modalComment.textContent = '半分以上のモグラを撃破！\n紫色の罠モグラを徹底スルーするのがコツ。';
            } else {
                modalTitle.textContent = '🎮 GAME OVER 🎮';
                modalComment.textContent = '焦らずに、プラスになる茶色と金色の\nモグラだけをじっくり狙ってみよう！';
            }
            
            // ポップアップを表示（CSSアニメーションが発火）
            resultModal.classList.add('show');
        }

        // ポップアップを閉じる処理
        function closeModal() {
            resultModal.classList.remove('show');
            startBtn.disabled = false; // スタートボタンを再度押せるように
        }

        function whack(mole) {
            const hole = mole.parentNode;
            if (!hole.classList.contains('up') || mole.classList.contains('whacked')) return;
            
            const type = mole.dataset.type;
            let points = 0;
            let effectText = '';
            let effectColor = '';

            if (type === 'normal') {
                points = 5;
                effectText = '+5';
                effectColor = '#ff5722';
            } else if (type === 'gold') {
                points = 10;
                effectText = '✨+10✨';
                effectColor = '#ffd700';
            } else if (type === 'purple') {
                points = -5;
                effectText = '💢-5';
                effectColor = '#9c27b0';
            }
            
            score += points;
            if (score < 0) score = 0; 
            scoreDisplay.textContent = score;
            
            mole.classList.add('whacked');
            clearTimeout(hole.dataset.timeoutId);
            activeMoles--;
            
            const effect = document.createElement('div');
            effect.className = 'hit-text';
            effect.textContent = effectText;
            effect.style.color = effectColor;
            hole.appendChild(effect);
            setTimeout(() => effect.remove(), 400);
            
            setTimeout(() => {
                hole.classList.remove('up');
                mole.classList.remove('whacked');
                nextMole();
            }, 120);
        }
    </script>
</body>
</html>
