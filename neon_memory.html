<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no" />
<title>NEON MEMORY</title>

<style>
*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    background:
        radial-gradient(circle at top,#182544,#070b16 50%,#02040a);
    color:#fff;
    overflow:hidden;
}

.container{
    width:min(95vw,520px);
    padding:20px;
    text-align:center;
}

.title{
    font-size:clamp(30px,7vw,48px);
    font-weight:bold;
    margin-bottom:12px;
    color:#67e8f9;
    text-shadow:
        0 0 10px #00e5ff,
        0 0 30px #00e5ff,
        0 0 60px #00e5ff;
}

.info{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin:18px 0;
}

.panel{
    flex:1;
    min-width:100px;
    background:rgba(255,255,255,.05);
    border:2px solid rgba(0,255,255,.25);
    border-radius:18px;
    padding:14px;
    box-shadow:0 0 25px rgba(0,255,255,.15);
}

.label{
    font-size:13px;
    color:#8defff;
}

.value{
    margin-top:6px;
    font-size:26px;
    font-weight:bold;
}

.status{
    min-height:30px;
    margin:15px 0 22px;
    font-size:18px;
    color:#bffcff;
    text-shadow:0 0 10px cyan;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
}

.cell{
    aspect-ratio:1;
    border-radius:22px;
    background:
        linear-gradient(145deg,#0c1830,#08111f);
    border:2px solid rgba(0,255,255,.15);
    box-shadow:
        inset 0 0 12px rgba(255,255,255,.05),
        0 0 10px rgba(0,255,255,.1);
    transition:.08s;
}

.cell.active{
    transform:scale(1.06);
    background:
        linear-gradient(145deg,#00d0ff,#7b2fff);
    box-shadow:
        0 0 20px #00e5ff,
        0 0 45px #00e5ff,
        0 0 80px #7b2fff;
}

.cell.player{
    transform:scale(1.05);
    background:
        linear-gradient(145deg,#ff2cdf,#00fff7);
    box-shadow:
        0 0 25px #ff2cdf,
        0 0 50px #00fff7;
}

button{
    border:none;
    cursor:pointer;
    margin-top:24px;
    padding:16px 34px;
    font-size:20px;
    font-weight:bold;
    border-radius:999px;
    color:#fff;
    background:
      linear-gradient(135deg,#00cfff,#6d28ff);
    box-shadow:
      0 0 15px #00e5ff,
      0 0 35px rgba(0,229,255,.4);
}

button:active{
    transform:scale(.95);
}

.overlay{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,.85);
    opacity:0;
    pointer-events:none;
    transition:.25s;
    z-index:999;
}

.overlay.show{
    opacity:1;
    pointer-events:auto;
}

.modal-box{
    width:min(90vw,360px);
    padding:28px;
    border-radius:30px;
    text-align:center;
    background:rgba(8,16,30,.96);
    border:2px solid rgba(0,255,255,.25);
    box-shadow:
      0 0 25px rgba(0,255,255,.25),
      0 0 70px rgba(0,255,255,.15);
}

.modal-title{
    font-size:30px;
    font-weight:bold;
    margin-bottom:14px;
    color:#7be9ff;
    text-shadow:0 0 15px cyan;
}

.modal-text{
    font-size:18px;
    margin-bottom:24px;
}

.modal-buttons{
    display:flex;
    gap:12px;
}

.modal-buttons button{
    flex:1;
    margin:0;
}

.cancel-btn{
    background:
      linear-gradient(135deg,#444,#222);
}

.gameover-title{
    color:#ff5ea8;
    text-shadow:
      0 0 10px hotpink,
      0 0 30px hotpink;
}

.final-score{
    margin:18px 0;
    font-size:26px;
}
</style>
</head>

<body>

<div class="container">

    <div class="title">NEON MEMORY</div>

    <div class="info">
        <div class="panel">
            <div class="label">LEVEL</div>
            <div class="value" id="level">0</div>
        </div>

        <div class="panel">
            <div class="label">SCORE</div>
            <div class="value" id="score">0</div>
        </div>

        <div class="panel">
            <div class="label">BEST</div>
            <div class="value" id="best">0</div>
        </div>
    </div>

    <div class="status" id="status">
        STARTを押してください
    </div>

    <div class="board" id="board"></div>

    <button id="startBtn">
        START
    </button>

</div>

<div class="overlay" id="gameOverModal">
    <div class="modal-box">
        <div class="modal-title gameover-title">
            GAME OVER
        </div>

        <div class="final-score" id="finalScore">
            SCORE : 0
        </div>

        <button onclick="restartImmediately()">
            RESTART
        </button>
    </div>
</div>

<div class="overlay" id="confirmModal">
    <div class="modal-box">
        <div class="modal-title">
            RESTART ?
        </div>

        <div class="modal-text">
            最初からやり直しますか？
        </div>

        <div class="modal-buttons">
            <button onclick="confirmRestart()">
                はい
            </button>

            <button class="cancel-btn"
                onclick="closeConfirmModal()">
                キャンセル
            </button>
        </div>
    </div>
</div>

<script>
const board=document.getElementById("board");
const levelEl=document.getElementById("level");
const scoreEl=document.getElementById("score");
const bestEl=document.getElementById("best");
const statusEl=document.getElementById("status");

const gameOverModal=document.getElementById("gameOverModal");
const confirmModal=document.getElementById("confirmModal");
const finalScore=document.getElementById("finalScore");

let sequence=[];
let playerIndex=0;
let canTap=false;
let score=0;
let gameStarted=false;

let best=localStorage.getItem("neonBest") || 0;
bestEl.textContent=best;

for(let i=0;i<9;i++){

    const cell=document.createElement("div");
    cell.className="cell";
    cell.dataset.index=i;

    cell.addEventListener("click",()=>{
        tapCell(i);
    });

    board.appendChild(cell);
}

const cells=document.querySelectorAll(".cell");

function sleep(ms){
    return new Promise(r=>setTimeout(r,ms));
}

function playSound(freq=400,duration=80){

    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();

    osc.type="sine";
    osc.frequency.value=freq;

    osc.connect(gain);
    gain.connect(ctx.destination);

    gain.gain.value=.08;

    osc.start();

    gain.gain.exponentialRampToValueAtTime(
        0.0001,
        ctx.currentTime+duration/1000
    );

    osc.stop(ctx.currentTime+duration/1000);
}

async function nextRound(){

    canTap=false;
    playerIndex=0;

    sequence.push(
        Math.floor(Math.random()*9)
    );

    levelEl.textContent=sequence.length;

    statusEl.textContent="覚えて！";

    await sleep(250);

    for(let index of sequence){

        cells[index].classList.add("active");

        playSound(480,70);

        await sleep(220);

        cells[index].classList.remove("active");

        await sleep(80);
    }

    statusEl.textContent=
        "順番どおりタップ！";

    canTap=true;
}

function tapCell(index){

    if(!canTap)return;

    cells[index].classList.add("player");

    playSound(700,50);

    setTimeout(()=>{
        cells[index].classList.remove("player");
    },100);

    if(index===sequence[playerIndex]){

        playerIndex++;

        if(playerIndex===sequence.length){

            score++;
            scoreEl.textContent=score;

            canTap=false;

            statusEl.textContent=
                "成功！";

            setTimeout(()=>{
                nextRound();
            },350);
        }

    }else{
        gameOver();
    }
}

function gameOver(){

    canTap=false;

    playSound(140,300);

    if(score>best){
        best=score;
        localStorage.setItem(
            "neonBest",
            best
        );
    }

    bestEl.textContent=best;

    finalScore.textContent=
        "SCORE : "+score;

    gameOverModal.classList.add("show");
}

function restartImmediately(){

    gameOverModal.classList.remove("show");
    resetGame();
}

function resetGame(){

    sequence=[];
    playerIndex=0;
    score=0;

    scoreEl.textContent=0;
    levelEl.textContent=0;

    gameStarted=true;

    nextRound();
}

function confirmRestart(){

    closeConfirmModal();
    resetGame();
}

function closeConfirmModal(){
    confirmModal.classList.remove("show");
}

document.getElementById("startBtn")
.addEventListener("click",()=>{

    if(gameStarted){
        confirmModal.classList.add("show");
        return;
    }

    gameStarted=true;
    resetGame();
});
</script>

</body>
</html>
