<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<!-- Google Font -->
<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Yusei+Magic&display=swap"
      rel="stylesheet">

<title>〇×ゲーム</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;

    font-family:
      'Yusei Magic',
      sans-serif;

    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
      radial-gradient(circle at top,
      #1f2937,#0d1117);

    padding:20px;
}

/* 全体カード */
.container{
    width:100%;
    max-width:480px;

    text-align:center;

    background:
      rgba(255,255,255,0.08);

    border:
      1px solid
      rgba(255,255,255,0.08);

    border-radius:32px;

    padding:28px;

    backdrop-filter:
      blur(14px);

    box-shadow:
      0 0 30px
      rgba(0,255,255,.08);
}

h1{
    margin-top:0;
    margin-bottom:24px;
    font-size:32px;
}

/* ボード */
table{
    margin:auto;
    border-collapse:separate;
    border-spacing:10px;
}

/* マス */
td{
    width:100px;
    height:100px;

    text-align:center;
    vertical-align:middle;

    font-size:42px;

    cursor:pointer;

    border-radius:22px;

    background:
      rgba(255,255,255,0.08);

    border:
      1px solid
      rgba(255,255,255,0.08);

    transition:.2s;
}

td:hover{
    transform:translateY(-2px);

    box-shadow:
      0 0 18px
      rgba(0,255,255,.18);
}

/* 勝利マス */
td.winner{
    background:
      linear-gradient(
      135deg,
      #f59e0b,
      #ef4444
      );

    color:white;
}

/* 次に消えるマス（見やすく変更） */
td.disabled{
    cursor:not-allowed;

    background:
      linear-gradient(
      135deg,
      rgba(239,68,68,.35),
      rgba(245,158,11,.25)
      );

    border:
      2px solid #ff6b6b;

    box-shadow:
      0 0 12px rgba(255,90,90,.6),
      inset 0 0 10px rgba(255,90,90,.2);

    animation:
      warningPulse 1.2s infinite;
}

/* ふわっと点滅 */
@keyframes warningPulse{

    0%{
        box-shadow:
          0 0 10px rgba(255,90,90,.4),
          inset 0 0 8px rgba(255,90,90,.15);
    }

    50%{
        box-shadow:
          0 0 24px rgba(255,90,90,.9),
          inset 0 0 18px rgba(255,90,90,.3);
    }

    100%{
        box-shadow:
          0 0 10px rgba(255,90,90,.4),
          inset 0 0 8px rgba(255,90,90,.15);
    }
}

/* ボタン */
button{
    margin-top:24px;

    border:none;

    border-radius:20px;

    padding:14px 22px;

    font-size:16px;

    cursor:pointer;

    color:white;

    background:
      linear-gradient(
      135deg,
      #8b5cf6,
      #2563eb
      );

    transition:.2s;
}

button:hover{
    transform:translateY(-2px);

    box-shadow:
      0 0 20px
      rgba(99,102,241,.4);
}

button:active{
    transform:scale(.97);
}

/* ステータス */
#status{
    margin-top:20px;
    font-size:18px;
    opacity:.9;
}

/* スマホ */
@media(max-width:600px){

    .container{
        padding:20px;
    }

    h1{
        font-size:28px;
    }

    td{
        width:82px;
        height:82px;
        font-size:36px;
    }

    button{
        width:100%;
    }
}

</style>
</head>

<body>

<div class="container">

    <h1>⭕❌ 〇×ゲーム</h1>

    <table id="board">
        <tr>
            <td data-index="0"></td>
            <td data-index="1"></td>
            <td data-index="2"></td>
        </tr>

        <tr>
            <td data-index="3"></td>
            <td data-index="4"></td>
            <td data-index="5"></td>
        </tr>

        <tr>
            <td data-index="6"></td>
            <td data-index="7"></td>
            <td data-index="8"></td>
        </tr>
    </table>

    <button onclick="resetGame()">
        ゲームをリセット
    </button>

    <p id="status">
        プレイヤーXのターンです
    </p>

</div>

<script src="script.js"></script>

<audio id="btn_audio">
    <source src="./audio/btn_audio.mp3"
            type="audio/mp3">
</audio>

</body>
</html>
