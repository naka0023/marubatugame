<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>魚辺の漢字クイズ - 200問チャレンジ</title>
<style>
    :root {
        --primary: #005A9C;
        --bg: #E3F2FD;
        --correct: #ef4444;
        --incorrect: #3b82f6;
    }
    body {
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        background-color: var(--bg);
        color: #333;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }
    #game-container {
        background: #fff;
        width: 100%;
        max-width: 500px;
        min-height: 600px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        padding: 20px;
        box-sizing: border-box;
        position: relative;
        overflow: hidden;
    }
    h1, h2 { text-align: center; color: var(--primary); }
    
    .screen { display: none; flex-direction: column; height: 100%; }
    .screen.active { display: flex; }
    
    /* Start Screen */
    .menu-box { margin-top: 20px; padding: 15px; background: #f0f7ff; border-radius: 8px; text-align: center;}
    input[type="number"] { width: 70px; padding: 8px; font-size: 16px; text-align: center; }
    button {
        background-color: var(--primary); color: white; border: none;
        padding: 12px 20px; font-size: 16px; border-radius: 8px;
        cursor: pointer; margin: 10px 0; transition: background 0.2s;
        width: 100%;
    }
    button:hover { background-color: #004080; }
    button:disabled { background-color: #ccc; cursor: not-allowed; }

    /* Quiz Screen */
    #question-header { display: flex; justify-content: space-between; font-weight: bold; color: #666; margin-bottom: 20px;}
    #kanji-display { font-size: 100px; text-align: center; margin: 20px 0; color: #111; line-height: 1;}
    .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: auto;}
    .choice-btn { background-color: #fff; color: var(--primary); border: 2px solid var(--primary); font-size: 20px; font-weight: bold;}
    .choice-btn:hover { background-color: var(--primary); color: #fff;}

    /* Explanation Screen */
    #result-title { font-size: 28px; text-align: center; font-weight: bold; margin-top: 10px; }
    .result-correct { color: var(--correct); }
    .result-incorrect { color: var(--incorrect); }
    #explanation-box { background: #f9f9f9; padding: 15px; border-radius: 8px; margin: 20px 0; font-size: 16px; line-height: 1.6;}
    .correct-ans { font-size: 24px; font-weight: bold; color: var(--primary); text-align: center; margin-bottom: 10px;}

    /* Effects */
    #effect-overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; display: flex; justify-content: center; align-items: center;
        opacity: 0; z-index: 100;
    }
    .effect-mark { font-size: 250px; font-weight: bold; }
    
    @keyframes popIn {
        0% { transform: scale(0.5); opacity: 0; }
        50% { transform: scale(1.2); opacity: 1; }
        100% { transform: scale(1); opacity: 0; }
    }
    .animate-effect { animation: popIn 0.8s ease-out forwards; }
</style>
</head>
<body>

<div id="game-container">
    <div id="start-screen" class="screen active">
        <h1>🐟 魚辺の漢字クイズ 🐟</h1>
        <p style="text-align: center;"><span id="total-q-text-title">全200問</span>！魚の漢字の読み方と雑学を学ぼう！</p>
        
        <div class="menu-box">
            <button onclick="startGame(1)">最初からスタート</button>
        </div>

        <div class="menu-box">
            <h3>続きから遊ぶ</h3>
            <p id="save-info">保存されたデータはありません</p>
            <button id="resume-btn" onclick="resumeGame()" disabled>前回の続きから</button>
        </div>

        <div class="menu-box">
            <h3>問題を指定してスタート</h3>
            <label>問題番号 (1〜<span id="total-q-text-input">200</span>): <input type="number" id="jump-input" min="1" value="1"></label>
            <button onclick="jumpToGame()">指定してスタート</button>
        </div>
    </div>

    <div id="quiz-screen" class="screen">
        <div id="question-header">
            <span id="q-number">第 1 問 / 200</span>
            <button onclick="returnToTitle()" style="width: auto; padding: 5px 10px; margin: 0; font-size: 12px;">タイトルへ</button>
        </div>
        <div id="kanji-display">鮪</div>
        <div class="choice-grid" id="choices-container">
            </div>
    </div>

    <div id="explanation-screen" class="screen">
        <div id="result-title">正解！</div>
        <div class="correct-ans">正解：<span id="correct-text">マグロ</span></div>
        <div id="explanation-box">
            ここに魚の雑学が表示されます。
        </div>
        <button id="next-btn" onclick="nextQuestion()">次の問題へ</button>
        <button onclick="returnToTitle()" style="background: #666;">タイトルへ戻る</button>
    </div>

    <div id="effect-overlay">
        <div id="effect-mark" class="effect-mark"></div>
    </div>
</div>

    // ゲームのステート
    let questions = [];
    let currentQuestionIndex = 0;

    // 全ての答えのリスト（ダミー選択肢用）
    const allReadings = Array.from(new Set(rawData.map(item => item[1])));

    // DOM要素の取得
    const startScreen = document.getElementById('start-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const explanationScreen = document.getElementById('explanation-screen');
    
    const qNumberEl = document.getElementById('q-number');
    const kanjiDisplay = document.getElementById('kanji-display');
    const choicesContainer = document.getElementById('choices-container');
    
    const resultTitle = document.getElementById('result-title');
    const correctText = document.getElementById('correct-text');
    const explanationBox = document.getElementById('explanation-box');
    const nextBtn = document.getElementById('next-btn');

    const effectOverlay = document.getElementById('effect-overlay');
    const effectMark = document.getElementById('effect-mark');
    const saveInfo = document.getElementById('save-info');
    const resumeBtn = document.getElementById('resume-btn');

    const totalQTextTitle = document.getElementById('total-q-text-title');
    const totalQTextTextInput = document.getElementById('total-q-text-input');
    const jumpInput = document.getElementById('jump-input');

    // 初期化処理
    function init() {
        // 問題配列の作成
        questions = rawData.map((data, index) => {
            return {
                id: index + 1,
                kanji: data[0],
                reading: data[1],
                trivia: data[2]
            };
        });

        // タイトル画面の総問題数テキストを動的にセット
        totalQTextTitle.textContent = `全 ${questions.length} 問`;
        totalQTextTextInput.textContent = questions.length;
        jumpInput.max = questions.length;

        // セーブデータの確認
        const savedIndex = localStorage.getItem('uohenQuizIndex200');
        if (savedIndex !== null && parseInt(savedIndex) < questions.length) {
            saveInfo.textContent = `前回は 第 ${parseInt(savedIndex) + 1} 問 まで進めました`;
            resumeBtn.disabled = false;
        } else {
            saveInfo.textContent = "保存されたデータはありません";
            resumeBtn.disabled = true;
        }
    }

    // ゲーム開始関数
    function startGame(qNumber) {
        currentQuestionIndex = qNumber - 1;
        if (currentQuestionIndex < 0 || currentQuestionIndex >= questions.length) currentQuestionIndex = 0;
        showScreen('quiz');
        renderQuestion();
    }

    function resumeGame() {
        const savedIndex = localStorage.getItem('uohenQuizIndex200');
        startGame(parseInt(savedIndex) + 1 || 1);
    }

    function jumpToGame() {
        const jumpInputValue = parseInt(jumpInput.value);
        if(isNaN(jumpInputValue) || jumpInputValue < 1 || jumpInputValue > questions.length) {
            alert(`1〜${questions.length}の数字を入力してください`);
            return;
        }
        startGame(jumpInputValue);
    }

    function returnToTitle() {
        showScreen('start');
        init(); // セーブデータを再読み込み
    }

    // 問題の描画
    function renderQuestion() {
        const q = questions[currentQuestionIndex];
        qNumberEl.textContent = `第 ${q.id} 問 / ${questions.length}`;
        kanjiDisplay.textContent = q.kanji;
        
        // 選択肢の生成 (正解1 + 不正解3)
        let choices = [q.reading];
        while (choices.length < 4) {
            const randomReading = allReadings[Math.floor(Math.random() * allReadings.length)];
            if (!choices.includes(randomReading)) {
                choices.push(randomReading);
            }
        }
        // シャッフル
        choices = choices.sort(() => Math.random() - 0.5);

        // ボタンの生成
        choicesContainer.innerHTML = '';
        choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.textContent = choice;
            btn.onclick = () => checkAnswer(choice, q.reading, q.trivia);
            choicesContainer.appendChild(btn);
        });

        // 進行状況の保存
        localStorage.setItem('uohenQuizIndex200', currentQuestionIndex);
    }

    // 答え合わせとエフェクト
    function checkAnswer(selected, correct, trivia) {
        const isCorrect = (selected === correct);
        
        // エフェクト表示
        effectMark.textContent = isCorrect ? '⭕️' : '❌';
        effectMark.style.color = isCorrect ? 'var(--correct)' : 'var(--incorrect)';
        effectOverlay.style.opacity = 1;
        effectMark.classList.remove('animate-effect');
        
        // アニメーションのリセットのためにわずかな遅延を入れる
        void effectMark.offsetWidth; 
        effectMark.classList.add('animate-effect');

        // エフェクト後に解説画面へ
        setTimeout(() => {
            effectOverlay.style.opacity = 0;
            showExplanation(isCorrect, selected, correct, trivia);
        }, 900);
    }

    // 解説画面の表示
    function showExplanation(isCorrect, selected, correct, trivia) {
        showScreen('explanation');
        
        if (isCorrect) {
            resultTitle.textContent = "大正解！🎉";
            resultTitle.className = "result-correct";
        } else {
            resultTitle.textContent = `残念... あなたの回答: ${selected}`;
            resultTitle.className = "result-incorrect";
        }

        correctText.textContent = correct;
        explanationBox.textContent = trivia;

        if (currentQuestionIndex >= questions.length - 1) {
            nextBtn.textContent = "結果発表へ";
            nextBtn.onclick = () => {
                alert(`全 ${questions.length} 問クリアおめでとうございます！あなたは魚辺漢字マスターです！`);
                localStorage.removeItem('uohenQuizIndex200');
                returnToTitle();
            };
        } else {
            nextBtn.textContent = "次の問題へ";
            nextBtn.onclick = nextQuestion;
        }
    }

    function nextQuestion() {
        currentQuestionIndex++;
        showScreen('quiz');
        renderQuestion();
    }

    // 画面切り替えユーティリティ
    function showScreen(screenName) {
        startScreen.classList.remove('active');
        quizScreen.classList.remove('active');
        explanationScreen.classList.remove('active');
        
        if (screenName === 'start') startScreen.classList.add('active');
        if (screenName === 'quiz') quizScreen.classList.add('active');
        if (screenName === 'explanation') explanationScreen.classList.add('active');
    }

    // 起動時に初期化
    init();

</script>
</body>
</html>
