            overflow-x: hidden; /* アニメーションがはみ出さないように */
        }

        .quiz-container {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 30px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            position: relative; /* オーバーレイ表示用 */
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .status-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 14px;
            color: #666;
        }

        .question-box {
            font-size: 18px;
            font-weight: bold;
            color: #222;
            margin-bottom: 30px;
            min-height: 60px;
            line-height: 1.6;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .option-btn {
            background-color: #fff;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            font-weight: 500;
            position: relative; /* アニメーション基準用 */
        }

        .option-btn:hover:not(:disabled) {
            background-color: #f7f9fa;
            border-color: #007bff;
            color: #007bff;
        }

        /* --- エフェクトとアニメーション定義 --- */

        /* 正解のボタンの基本スタイルとアニメーション */
        .option-btn.correct {
            background-color: #d4edda !important;
            border-color: #28a745 !important;
            color: #155724 !important;
            animation: correct-pulse 0.6s ease-out; /* パルスアニメーション */
        }

        /* 不正解のボタンの基本スタイルとアニメーション */
        .option-btn.incorrect {
            background-color: #f8d7da !important;
            border-color: #dc3545 !important;
            color: #721c24 !important;
            animation: incorrect-shake 0.5s linear; /* シェイクアニメーション */
        }

        /* 正解のパルスアニメーション */
        @keyframes correct-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* 不正解のシェイクアニメーション */
        @keyframes incorrect-shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        /* --- 正解/不正解アイコンのオーバーレイ --- */
        .result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* クリックを透過させる */
            z-index: 1000;
            opacity: 0;
            animation: result-fade-out 0.8s ease-out; /* フェードアウト */
        }

        .result-icon {
            font-size: 150px;
            font-weight: bold;
        }

        .correct-icon {
            color: rgba(40, 167, 69, 0.8); /* 透明度のある緑 */
        }

        .incorrect-icon {
            color: rgba(220, 53, 69, 0.8); /* 透明度のある赤 */
        }

        /* フェードアウトアニメーション */
        @keyframes result-fade-out {
            0% { opacity: 0; transform: scale(0.5); }
            30% { opacity: 1; transform: scale(1); }
            80% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.1); }
        }

        /* -------------------------------------- */

        .next-btn {
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            font-size: 16px;
            cursor: pointer;
            display: none; /* 回答するまで非表示 */
            margin: 0 auto;
            font-weight: bold;
        }

        .next-btn:hover {
            background-color: #0056b3;
        }

        .result-screen {
            display: none;
        }

        .restart-btn {
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;

</head>

    let currentQuestionIndex = 0;
    let score = 0;

    const questionElement = document.getElementById('question');
    const optionsContainer = document.getElementById('options');
    const nextButton = document.getElementById('next-button');
    const progressElement = document.getElementById('progress');
    const scoreDisplayElement = document.getElementById('score-display');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const finalScoreElement = document.getElementById('final-score');
    const totalQuestionsElement = document.getElementById('total-questions');
    const evaluationMessage = document.getElementById('evaluation-message');

    // ゲームの開始
    function startGame() {
        currentQuestionIndex = 0;
        score = 0;
        quizScreen.style.display = 'block';
        resultScreen.style.display = 'none';
        scoreDisplayElement.textContent = `正解数: ${score}`;
        showQuestion();
    }

    // 問題の表示
    function showQuestion() {
        resetState();
        const currentQuestion = quizData[currentQuestionIndex];
        
        progressElement.textContent = `第 ${currentQuestionIndex + 1} / ${quizData.length} 問`;
        questionElement.textContent = currentQuestion.question;

        currentQuestion.options.forEach((option, index) => {
            const button = document.createElement('button');
            button.textContent = option;
            button.classList.add('option-btn');
            button.addEventListener('click', () => selectOption(index, button));
            optionsContainer.appendChild(button);
        });
    }

    // 状態リセット
    function resetState() {
        nextButton.style.display = 'none';
        while (optionsContainer.firstChild) {
            optionsContainer.removeChild(optionsContainer.firstChild);
        }
    }

    // --- エフェクト表示関数を追加 ---
    function showResultEffect(isCorrect) {
        // オーバーレイ要素を作成
        const overlay = document.createElement('div');
        overlay.classList.add('result-overlay');
        
        const icon = document.createElement('span');
        icon.classList.add('result-icon');
        
        if (isCorrect) {
            icon.textContent = '✓';
            icon.classList.add('correct-icon');
        } else {
            icon.textContent = '✗';
            icon.classList.add('incorrect-icon');
        }
        
        overlay.appendChild(icon);
        document.body.appendChild(overlay);
        
        // アニメーション終了後に削除（0.8秒後）
        setTimeout(() => {
            document.body.removeChild(overlay);
        }, 800);
    }
    // --------------------------------

    // 回答が選択された時の処理（エフェクト追加）
    function selectOption(selectedIndex, selectedButton) {
        const currentQuestion = quizData[currentQuestionIndex];
        const correctIndex = currentQuestion.answer;
        const allButtons = optionsContainer.querySelectorAll('.option-btn');

        // すべてのボタンを無効化
        allButtons.forEach(button => button.disabled = true);

        if (selectedIndex === correctIndex) {
            // 正解の場合：パルスエフェクトを追加
            selectedButton.classList.add('correct');
            score++;
            scoreDisplayElement.textContent = `正解数: ${score}`;
            showResultEffect(true); // ✓マークを表示
        } else {
            // 不正解の場合：シェイクエフェクトを追加
            selectedButton.classList.add('incorrect');
            // 正解のボタンもパルスで教える
            allButtons[correctIndex].classList.add('correct');
            showResultEffect(false); // ✗マークを表示
        }

        // 少し遅らせて「次の問題」ボタンを表示
        setTimeout(() => {
            nextButton.style.display = 'block';
        }, 500); // エフェクトを見せるため少し待つ
    }

    // 次の問題へ進む
    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    // 結果画面の表示
    function showResult() {
        quizScreen.style.display = 'none';
        resultScreen.style.display = 'block';
        finalScoreElement.textContent = score;
        totalQuestionsElement.textContent = quizData.length;

        const rate = score / quizData.length;
        if (rate === 1) {
            evaluationMessage.textContent = "完璧です！あなたこそ雑学王！";
        } else if (rate >= 0.7) {
            evaluationMessage.textContent = "素晴らしい！かなりの物知りですね。";
        } else if (rate >= 0.4) {
            evaluationMessage.textContent = "まずまずの結果です。次はもっと上を狙いましょう！";
        } else {
            evaluationMessage.textContent = "伸びしろがたくさんあります！もう一度挑戦してみよう。";
        }
    }

    // ゲームリスタート
    function restartGame() {
        startGame();
    }

    // ゲームスタート
    startGame();
</script>

</body>
</html>
