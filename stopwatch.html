<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>ストップウォッチチャレンジ</title>

<style>
*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    min-height:100vh;
    background:radial-gradient(circle at top,#1d2c52 0%,#090b15 45%,#000 100%);
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    overflow-x:hidden;
}

.container{
    width:min(92vw,560px);
    padding:20px;
    position: relative;
}

.title{
    text-align:center;
    font-size:clamp(32px,7vw,52px);
    font-weight:900;
    margin:20px 0;
    text-shadow:0 0 12px #00d9ff,0 0 28px #00d9ff;
}

.panel{
    background:rgba(255,255,255,.05);
    border:2px solid rgba(0,217,255,.3);
    border-radius:28px;
    padding:26px;
    backdrop-filter:blur(12px);
    box-shadow:0 0 40px rgba(0,217,255,.15), inset 0 0 20px rgba(255,255,255,.04);
    transition: all 0.3s ease;
}

/* チュートリアル時にパネルを黒背景(9990)より上、ポップアップ(10000)より下に配置 */
.panel.tutorial-panel-focus {
    position: relative;
    z-index: 9995;
}

.target{
    text-align:center;
    font-size:22px;
    margin-bottom:14px;
}

.mode-buttons{
    display:flex;
    gap:10px;
    margin-bottom:20px;
    border-radius: 18px;
    transition: all 0.3s;
}

.mode-btn{
    flex:1;
    padding:14px;
    border:none;
    border-radius:18px;
    font-size:20px;
    font-weight:900;
    color:white;
    cursor:pointer;
    background:rgba(255,255,255,.12);
}

.mode-btn.active{
    background:linear-gradient(135deg,#00e5ff,#245bff);
    box-shadow:0 0 25px rgba(0,229,255,.5);
}

.timer{
    font-size:clamp(60px,13vw,96px);
    font-weight:900;
    text-align:center;
    min-height:110px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:25px 0;
    color:#7be9ff;
    text-shadow:0 0 10px #00e5ff,0 0 30px #00e5ff,0 0 60px #00e5ff;
    border-radius: 14px;
    transition: all 0.3s;
}

.buttons{
    display:flex;
    gap:12px;
    border-radius: 22px;
    transition: all 0.3s;
}

button{
    border:none;
    border-radius:22px;
    padding:20px;
    font-size:24px;
    font-weight:900;
    color:white;
    cursor:pointer;
}

button:active{transform:scale(.96);}
button:disabled{opacity:.4;}

.start{
    flex:1;
    background:linear-gradient(135deg,#00ff88,#00b86b);
    box-shadow:0 0 30px rgba(0,255,136,.45);
}

.stop{
    flex:1;
    background:linear-gradient(135deg,#ff2b55,#c40028);
    box-shadow:0 0 30px rgba(255,43,85,.45);
}

.reset{
    width:100%;
    margin-top:14px;
    background:linear-gradient(135deg,#4f68ff,#243dff);
}

.result{
    min-height:110px;
    margin-top:20px;
    text-align:center;
}

.rank{
    font-size:44px;
    font-weight:900;
}

.perfect{
    color:#ffe44d;
    text-shadow:0 0 10px #ffe44d,0 0 40px #ffbf00;
    animation:pulse .8s infinite alternate;
}

.great{color:#00ffc8;}
.good{color:#7db9ff;}
.miss{color:#ff6a85;}

.diff{
    margin-top:8px;
    font-size:22px;
}

.history-box{
    margin-top:22px;
    background:rgba(255,255,255,.05);
    border-radius:22px;
    padding:18px;
}

.history-title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:12px;
}

.history-list{
    max-height:260px;
    overflow-y:auto;
}

.history-item{
    background:rgba(255,255,255,.08);
    padding:14px;
    border-radius:14px;
    margin-bottom:10px;
}

@keyframes pulse{
    from{transform:scale(1);}
    to{transform:scale(1.08);}
}

/* ==========================================
   チュートリアル用のスタイル（追従型にアップデート）
   ========================================== */
.help-btn {
    position: absolute;
    top: 24px;
    right: 20px;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(0,217,255,.4);
    border-radius: 50% !important;
    width: 42px !important;
    height: 42px !important;
    padding: 0 !important;
    font-size: 18px !important;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    z-index: 10;
    box-shadow: 0 0 10px rgba(0,217,255,.2);
    transition: all 0.2s;
}
.help-btn:hover {
    background: rgba(0,217,255,.2);
    box-shadow: 0 0 15px rgba(0,217,255,.6);
    transform: scale(1.05);
}

/* 暗い背景レイヤー */
.tutorial-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0, 0, 0, 0.75);
    z-index: 9990;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
}
.tutorial-overlay.active {
    opacity: 1;
    pointer-events: auto;
}

/* ポップアップ専用レイヤー */
.tutorial-popup-wrap {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 10000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
}
.tutorial-popup-wrap.active {
    opacity: 1;
    pointer-events: auto;
}

/* 【変更】position: absoluteにし、JSで位置を滑らかに動かす */
.tutorial-card {
    position: absolute;
    background: #0b0e17;
    border: 2px solid #ffe44d;
    box-shadow: 0 0 30px rgba(255, 228, 77, 0.3);
    border-radius: 24px;
    width: min(88vw, 400px);
    padding: 24px;
    color: white;
    text-align: center;
    transition: top 0.3s ease, bottom 0.3s ease, left 0.3s ease, transform 0.3s ease;
}

.tutorial-progress {
    font-size: 14px;
    color: #ffe44d;
    margin-bottom: 12px;
    font-weight: bold;
    letter-spacing: 1px;
}

.tutorial-text {
    font-size: 17px;
    line-height: 1.6;
    margin-bottom: 24px;
    min-height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.tutorial-footer {
    display: flex;
    gap: 12px;
}

.tutorial-btn {
    flex: 1;
    padding: 12px !important;
    font-size: 16px !important;
    font-weight: 900 !important;
    border-radius: 14px !important;
    margin: 0 !important;
}
.tutorial-btn.skip {
    background: rgba(255,255,255,.1);
    color: #ccc;
}
.tutorial-btn.next {
    background: linear-gradient(135deg, #ffe44d, #ffb300);
    color: #000;
}

.tutorial-focus {
    outline: 3px solid #ffe44d !important;
    outline-offset: 4px;
    box-shadow: 0 0 25px #ffe44d !important;
    animation: pulse 0.6s infinite alternate !important;
}
</style>
</head>

<body>

<div class="container">

<button id="helpBtn" class="help-btn" title="遊び方を見る">❓</button>

<div class="title">STOPWATCH CHALLENGE</div>

<div class="panel" id="gamePanel">

<div class="target" id="targetText">🎯 3秒で止めろ</div>

<div class="mode-buttons" id="stepMode">
<button class="mode-btn active" data-sec="3">3秒</button>
<button class="mode-btn" data-sec="5">5秒</button>
<button class="mode-btn" data-sec="10">10秒</button>
</div>

<div class="timer" id="timer">0.000</div>

<div class="buttons" id="stepButtons">
<button id="startBtn" class="start">START</button>
<button id="stopBtn" class="stop" disabled>STOP</button>
</div>

<button id="resetBtn" class="reset">RESET</button>

<div class="result" id="result"></div>

</div>

<div class="history-box">

<div class="history-title">🏆 プレイ履歴</div>

<div class="history-list" id="historyList">
<div style="opacity:.6">まだプレイ履歴はありません</div>
</div>

</div>

</div>

<div class="tutorial-overlay" id="tutorialOverlay"></div>
<div class="tutorial-popup-wrap" id="tutorialPopupWrap">
  <div class="tutorial-card" id="tutorialCard">
    <div class="tutorial-progress" id="tutorialProgress">1 / 4</div>
    <div class="tutorial-text" id="tutorialText">ここに説明が入ります</div>
    <div class="tutorial-footer">
      <button class="tutorial-btn skip" id="tutorialSkip">スキップ</button>
      <button class="tutorial-btn next" id="tutorialNext">次へ</button>
    </div>
  </div>
</div>

<script>
const timerEl = document.getElementById("timer");
const resultEl = document.getElementById("result");
const historyList = document.getElementById("historyList");
const targetText = document.getElementById("targetText");
const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");
const resetBtn = document.getElementById("resetBtn");

let startTime = 0;
let running = false;
let animationId;

let targetSeconds = 3; 

document.querySelectorAll(".mode-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
        if(running) return;

        document.querySelectorAll(".mode-btn")
        .forEach(b=>b.classList.remove("active"));

        btn.classList.add("active");

        targetSeconds = Number(btn.dataset.sec);
        targetText.textContent = `🎯 ${targetSeconds}秒で止めろ`;
    });
});

function updateTimer(){

    const elapsed =
    (performance.now() - startTime) / 1000;

    if(targetSeconds === 3){
        timerEl.textContent = "???";
    }else{
        if(elapsed < 1.5){
            timerEl.textContent = elapsed.toFixed(3);
        }else{
            timerEl.textContent = "???";
        }
    }

    animationId = requestAnimationFrame(updateTimer);
}

startBtn.onclick = ()=>{
    if(running) return;

    running = true;
    resultEl.innerHTML = "";

    startTime = performance.now();

    startBtn.disabled = true;
    stopBtn.disabled = false;

    updateTimer();
};

stopBtn.onclick = ()=>{
    if(!running) return;

    running = false;
    cancelAnimationFrame(animationId);

    const finalTime = (performance.now() - startTime) / 1000;

    timerEl.textContent = finalTime.toFixed(3);

    const diff = finalTime - targetSeconds;
    const abs = Math.abs(diff);

    let rank = "";
    let className = "";

    if(abs <= 0.01){rank="PERFECT";className="perfect";}
    else if(abs <= 0.10){rank="GREAT";className="great";}
    else if(abs <= 0.30){rank="GOOD";className="good";}
    else{rank="MISS";className="miss";}

    resultEl.innerHTML = `
        <div class="rank ${className}">${rank}</div>
        <div class="diff">
            目標 ${targetSeconds}秒<br>
            誤差: ${diff>=0?"+":""}${diff.toFixed(3)} 秒
        </div>
    `;

    if(historyList.innerText.includes("まだ")){
        historyList.innerHTML = "";
    }

    const item = document.createElement("div");
    item.className = "history-item";
    item.innerHTML = `
        🎯 ${targetSeconds}秒<br>
        ⏱ ${finalTime.toFixed(3)} 秒<br>
        🏅 ${rank}<br>
        📏 ${diff>=0?"+":""}${diff.toFixed(3)} 秒
    `;

    historyList.prepend(item);

    startBtn.disabled = false;
    stopBtn.disabled = true;
};

resetBtn.onclick = ()=>{
    running = false;
    cancelAnimationFrame(animationId);

    timerEl.textContent = "0.000";
    resultEl.innerHTML = "";

    startBtn.disabled = false;
    stopBtn.disabled = true;
};

/* ==========================================
   チュートリアル用の制御JavaScript（位置自動追従版）
   ========================================== */
const overlay = document.getElementById("tutorialOverlay");
const popupWrap = document.getElementById("tutorialPopupWrap");
const cardEl = document.getElementById("tutorialCard"); // 追加
const progressEl = document.getElementById("tutorialProgress");
const textEl = document.getElementById("tutorialText");
const nextBtn = document.getElementById("tutorialNext");
const skipBtn = document.getElementById("tutorialSkip");
const helpBtn = document.getElementById("helpBtn");
const gamePanel = document.getElementById("gamePanel");

let currentStep = 0;

const steps = [
    {
        text: "🎯 STOPWATCH CHALLENGE へようこそ！<br>体内時計を頼リに、目標ぴったりでタイマーを止めるゲームです。",
        element: null
    },
    {
        text: "⏱ ここに並んでいる「3秒」「5秒」「10秒」のボタンで、挑戦したい目標秒数を切り替えます。",
        element: document.getElementById("stepMode")
    },
    {
        text: "💡 STARTするとカウントが始まりますが、途中で画面が『???』に隠れてしまいます！自分の感覚を信じて数えましょう。",
        element: document.getElementById("timer")
    },
    {
        text: "🚀 ここだ！というタイミングでSTOP！<br>誤差0.01秒以内の『PERFECT』を目指しましょう！",
        element: document.getElementById("stepButtons")
    }
];

function showStep(index) {
    document.querySelectorAll(".tutorial-focus").forEach(el => el.classList.remove("tutorial-focus"));
    gamePanel.classList.remove("tutorial-panel-focus");

    if (index >= steps.length) {
        closeTutorial();
        return;
    }

    currentStep = index;
    const step = steps[index];

    progressEl.textContent = `${index + 1} / ${steps.length}`;
    textEl.innerHTML = step.text;
    nextBtn.textContent = index === steps.length - 1 ? "ゲーム開始！" : "次へ";

    if (step.element) {
        gamePanel.classList.add("tutorial-panel-focus");
        step.element.classList.add("tutorial-focus");

        // 【新機能】光っている要素の位置を取得し、その近くにポップアップを移動
        const rect = step.element.getBoundingClientRect();
        cardEl.style.left = "50%";
        cardEl.style.transform = "translateX(-50%)";

        // 要素が画面の下半分にあれば上に、上半分にあれば下に配置（被り防止）
        if (rect.top > window.innerHeight / 2) {
            cardEl.style.top = "auto";
            cardEl.style.bottom = `${window.innerHeight - rect.top + 15}px`;
        } else {
            cardEl.style.bottom = "auto";
            cardEl.style.top = `${rect.bottom + 15}px`;
        }
    } else {
        // 最初のステップ（全体説明）は画面中央に配置
        cardEl.style.top = "50%";
        cardEl.style.bottom = "auto";
        cardEl.style.left = "50%";
        cardEl.style.transform = "translate(-50%, -50%)";
    }
}

function openTutorial() {
    overlay.classList.add("active");
    popupWrap.classList.add("active");
    showStep(0);
}

function closeTutorial() {
    overlay.classList.remove("active");
    popupWrap.classList.remove("active");
    document.querySelectorAll(".tutorial-focus").forEach(el => el.classList.remove("tutorial-focus"));
    gamePanel.classList.remove("tutorial-panel-focus");
    localStorage.setItem("stopwatch_tutorial_played", "true");
}

nextBtn.onclick = () => showStep(currentStep + 1);
skipBtn.onclick = closeTutorial;
helpBtn.onclick = openTutorial;

window.addEventListener("DOMContentLoaded", () => {
    if (!localStorage.getItem("stopwatch_tutorial_played")) {
        openTutorial();
    }
});
</script>

</body>
</html>
