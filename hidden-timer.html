<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>隠しタイマー対戦</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:sans-serif;
    background:
      radial-gradient(circle at top,
      #1f2937,#0d1117);

    color:white;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

/* カード */
.game-card{

    width:100%;
    max-width:420px;

    border-radius:32px;
    padding:32px;

    background:
      rgba(255,255,255,0.08);

    border:1px solid
      rgba(255,255,255,0.08);

    backdrop-filter:blur(10px);

    text-align:center;
}

/* タイトル */
h1{
    margin:0;
    font-size:32px;
}

.sub{
    margin-top:10px;
    opacity:.7;
}

/* タイマー */
.timer-wrap{
    margin:40px 0 30px;
}

.timer{

    width:220px;
    height:220px;

    margin:auto;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:58px;
    font-weight:bold;

    background:
      linear-gradient(
        135deg,
        #8b5cf6,
        #2563eb
      );

    box-shadow:
      0 8px 30px
      rgba(0,0,0,.4);

    transition:.3s;
}

/* 負け演出 */
.timer.lose{

    background:
      linear-gradient(
        135deg,
        #ef4444,
        #dc2626
      );

    animation:
      shake .5s,
      pulse .8s infinite;
}

@keyframes shake{
    0%{transform:translateX(0);}
    20%{transform:translateX(-8px);}
    40%{transform:translateX(8px);}
    60%{transform:translateX(-8px);}
    80%{transform:translateX(8px);}
    100%{transform:translateX(0);}
}

@keyframes pulse{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.08);
    }
    100%{
        transform:scale(1);
    }
}

/* ボタン */
button{

    width:220px;
    height:72px;

    border:none;
    border-radius:24px;

    font-size:28px;
    font-weight:bold;

    cursor:pointer;

    color:white;

    background:
      linear-gradient(
        135deg,
        #06b6d4,
        #2563eb
      );

    transition:.2s;
}

button:hover{
    transform:translateY(-3px);

    box-shadow:
      0 0 30px
      rgba(0,255,255,.15);
}

button:active{
    transform:scale(.96);
}

button:disabled{
    opacity:.5;
}

/* ステータス */
.status{
    margin-top:26px;
    font-size:24px;
}

.status.lose{

    color:#ff6b6b;
    font-size:34px;
    font-weight:bold;

    animation:
      pulse .8s infinite;
}

.limit{
    margin-top:12px;
    opacity:.6;
}

/* スマホ */
@media(max-width:600px){

    h1{
        font-size:26px;
    }

    .timer{
        width:180px;
        height:180px;
        font-size:46px;
    }

    button{
        width:180px;
        height:64px;
        font-size:24px;
    }
}

</style>
</head>

<body>

<div class="game-card">

    <h1>⏱ 隠しタイマー対戦</h1>

    <div class="sub">
        合計時間が超えたら負け
    </div>

    <div class="timer-wrap">
        <div
          class="timer"
          id="timer">
            10秒
        </div>
    </div>

    <button id="toggleBtn">
        START
    </button>

    <div
      class="status"
      id="status">
        プレイヤー1のターン
    </div>

</div>

<script>

const LIMIT_SECONDS = 10;

let currentPlayer = 1;
let isRunning = false;
let startTime = 0;
let totalTime = 0;
let timerInterval = null;

const btn =
  document.getElementById(
    "toggleBtn"
  );

const status =
  document.getElementById(
    "status"
  );

const timer =
  document.getElementById(
    "timer"
  );

/* 負け処理 */
function lose(){

    isRunning = false;

    clearInterval(
      timerInterval
    );

    timer.classList
      .add("lose");

    status.classList
      .add("lose");

    timer.textContent =
      "💥";

    status.textContent =
      `PLAYER ${currentPlayer} LOSE`;

    btn.disabled = true;
}

/* 現在の累計時間 */
function getCurrentTime(){

    let current =
      totalTime;

    if(isRunning){

        current +=
          (Date.now()
          - startTime)
          / 1000;
    }

    return current;
}

btn.addEventListener(
"click",()=>{

    // START
    if(!isRunning){

        startTime =
          Date.now();

        isRunning = true;

        btn.textContent =
          "STOP";

        status.textContent =
          `プレイヤー${currentPlayer} 計測中`;

        // リアルタイム監視
        timerInterval =
          setInterval(()=>{

            const current =
              getCurrentTime();

            // 超えた瞬間負け
            if(current >=
               LIMIT_SECONDS){

                lose();
            }

          },10);

        return;
    }

    // STOP
    const elapsed =
      (Date.now()
      - startTime)
      / 1000;

    totalTime += elapsed;

    isRunning = false;

    clearInterval(
      timerInterval
    );

    btn.textContent =
      "START";

    // プレイヤー交代
    currentPlayer =
      currentPlayer === 1
      ? 2
      : 1;

    status.textContent =
      `プレイヤー${currentPlayer} のターン`;
});

</script>

</body>
</html>
