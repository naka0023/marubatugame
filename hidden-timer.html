<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>隠しタイマー対戦</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:sans-serif;
    background:
      radial-gradient(circle at top,
      #1f2937,#0d1117);

    color:white;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

.game-card{

    width:100%;
    max-width:520px;

    border-radius:32px;
    padding:32px;

    background:
      rgba(255,255,255,0.08);

    border:1px solid
      rgba(255,255,255,0.08);

    backdrop-filter:blur(10px);

    text-align:center;
    position: relative;
}

/* チュートリアル確認ボタン */
.btn-rule{
    width: auto;
    height: auto;
    padding: 8px 16px;
    font-size: 14px;
    border-radius: 12px;
    background: rgba(255,255,255,0.1);
    margin-bottom: 10px;
    display: inline-block;
}

.btn-rule:hover:not(:disabled){
    background: rgba(255,255,255,0.2);
}

/* チュートリアルモーダル */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(8px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
}

.modal-overlay.show {
    opacity: 1;
    pointer-events: auto;
}

.modal-content {
    background: #1f2937;
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 30px;
    border-radius: 24px;
    max-width: 420px;
    width: 90%;
    text-align: left;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

.modal-content h2 {
    margin-top: 0;
    text-align: center;
    font-size: 24px;
    color: #a78bfa;
}

.modal-content ol {
    padding-left: 20px;
    line-height: 1.6;
}

.modal-content li {
    margin-bottom: 12px;
}

.modal-close-btn {
    width: 100%;
    height: 54px;
    font-size: 20px;
    margin-top: 20px;
    background: linear-gradient(135deg, #8b5cf6, #2563eb);
}

h1{
    margin:0;
    font-size:32px;
}

.sub{
    margin-top:10px;
    opacity:.7;
}

.timer-wrap{
    margin:40px 0 30px;
}

.timer{

    width:220px;
    height:220px;

    margin:auto;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:58px;
    font-weight:bold;

    background:
      linear-gradient(
        135deg,
        #8b5cf6,
        #2563eb
      );

    box-shadow:
      0 8px 30px
      rgba(0,0,0,.4);

    transition:.3s;
}

/* 負け演出 */
.timer.lose{

    background:
      linear-gradient(
        135deg,
        #ef4444,
        #dc2626
      );

    animation:
      shake .5s,
      pulse .8s infinite;
}

@keyframes shake{
    0%{transform:translateX(0);}
    20%{transform:translateX(-8px);}
    40%{transform:translateX(8px);}
    60%{transform:translateX(-8px);}
    80%{transform:translateX(8px);}
    100%{transform:translateX(0);}
}

@keyframes pulse{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.08);
    }
    100%{
        transform:scale(1);
    }
}

/* ボタン共通 */
button{

    width:220px;
    height:72px;

    border:none;
    border-radius:24px;

    font-size:28px;
    font-weight:bold;

    cursor:pointer;

    color:white;
    transition:.2s;
}

/* START状態 */
.btn-start{
    background:
      linear-gradient(
        135deg,
        #22c55e,
        #16a34a
      );
}

.btn-start:hover:not(:disabled){
    transform:translateY(-3px);

    box-shadow:
      0 0 30px
      rgba(34,197,94,.35);
}

/* STOP状態 */
.btn-stop{
    background:
      linear-gradient(
        135deg,
        #ef4444,
        #dc2626
      );
}

.btn-stop:hover:not(:disabled){
    transform:translateY(-3px);

    box-shadow:
      0 0 30px
      rgba(239,68,68,.35);
}

button:active:not(:disabled){
    transform:scale(.96);
}

button:disabled{
    opacity:.3;
    cursor:not-allowed;
}

/* ステータス */
.status{
    margin-top:26px;
    font-size:24px;
}

.status.lose{

    color:#ff6b6b;
    font-size:34px;
    font-weight:bold;

    animation:
      pulse .8s infinite;
}

/* 履歴 */

.history{
    margin-top:40px;
    text-align:left;
    display:none;
}

.history.show{
    display:block;
}

.history-title{
    font-size:22px;
    margin-bottom:12px;
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
    overflow:hidden;
    border-radius:18px;
}

th,td{
    padding:12px;
    text-align:center;
}

th{
    background:
      rgba(255,255,255,.15);
}

tr{
    background:
      rgba(255,255,255,.05);
}

tr:nth-child(even){
    background:
      rgba(255,255,255,.08);
}

@media(max-width:600px){

    h1{
        font-size:26px;
    }

    .timer{
        width:180px;
        height:180px;
        font-size:46px;
    }

    button{
        width:180px;
        height:64px;
        font-size:24px;
    }
}

</style>
</head>

<body>

<div class="modal-overlay show" id="tutorialModal">
    <div class="modal-content">
        <h2>📖 遊び方ガイド</h2>
        <p>このゲームは2人対戦用の<strong>「体内時計チキンレース」</strong>です！</p>
        <ol>
            <li><strong>START</strong>を押すと、画面のタイマーが隠れた状態でカウントが始まります。</li>
            <li>自分の感覚を信じて<strong>STOP</strong>を押し、次のプレイヤーに交代します。</li>
            <li>2人の合計時間が<strong>10秒</strong>を超えた瞬間に、その時タイマーを動かしていたプレイヤーの<strong>負け</strong>となります！</li>
        </ol>
        <p style="font-size: 14px; opacity: 0.8; text-align: center; margin-top: 20px;">
            ⏱ ギリギリを攻めて相手にターンを回そう！
        </p>
        <button class="modal-close-btn" id="closeModalBtn">ゲーム開始！</button>
    </div>
</div>

<div class="game-card">

    <button id="openModalBtn" class="btn-rule">❓ ルールを見る</button>

    <h1>⏱ 隠しタイマー対戦</h1>

    <div class="sub">
        合計時間が超えたら負け
    </div>

    <div class="timer-wrap">
        <div
          class="timer"
          id="timer">
        </div>
    </div>

    <button
      id="toggleBtn"
      class="btn-start">
        START
    </button>

    <div
      class="status"
      id="status">
        プレイヤー1のターン
    </div>

    <div
      class="history"
      id="history">

        <div class="history-title">
            📜 プレイ履歴
        </div>

        <table>

            <thead>
            <tr>
                <th>Player</th>
                <th>Action</th>
                <th>Total</th>
                <th>Turn</th>
            </tr>
            </thead>

            <tbody id="historyBody">
            </tbody>

        </table>
    </div>

</div>

<script>

const LIMIT_SECONDS = 10;

let currentPlayer = 1;
let isRunning = false;
let startTime = 0;
let totalTime = 0;
let timerInterval = null;

const logs = [];

const btn =
document.getElementById(
"toggleBtn");

const status =
document.getElementById(
"status");

const timer =
document.getElementById(
"timer");

const history =
document.getElementById(
"history");

const historyBody =
document.getElementById(
"historyBody");

/* チュートリアル用の要素 */
const tutorialModal = 
document.getElementById(
"tutorialModal");

const closeModalBtn = 
document.getElementById(
"closeModalBtn");

const openModalBtn = 
document.getElementById(
"openModalBtn");


/* 目標秒数表示 */
timer.textContent =
`${LIMIT_SECONDS}秒`;

/* チュートリアル制御 */
closeModalBtn.addEventListener(
"click",()=>{
    tutorialModal.classList
      .remove("show");
});

openModalBtn.addEventListener(
"click",()=>{
    tutorialModal.classList
      .add("show");
});


/* 現在時間 */
function currentTime(){

    let current =
      totalTime;

    if(isRunning){

        current +=
          (Date.now()
          - startTime)
          / 1000;
    }

    return current;
}

/* ログ追加 */
function addLog(
    action,
    total,
    turn = null
){

    logs.push({

        player:
          currentPlayer,

        action,

        totalTime:
          total.toFixed(2),

        turnTime:
          turn === null
          ? "-"
          : turn.toFixed(2)
    });
}

/* 履歴描画 */
function renderHistory(){

    historyBody.innerHTML =
      ""

    logs.forEach(log=>{

        historyBody.innerHTML += `
        <tr>
            <td>P${log.player}</td>
            <td>${log.action}</td>
            <td>${log.totalTime}s</td>
            <td>${log.turnTime}s</td>
        </tr>`;
    });

    history.classList
      .add("show");
}

/* 負け処理 */
function lose(){

    isRunning = false;

    clearInterval(
      timerInterval
    );

    const loseTime =
      currentTime();

    const turnTime =
      (Date.now()
      - startTime)
      / 1000;

    addLog(
      "LOSE",
      loseTime,
      turnTime
    );

    timer.classList
      .add("lose");

    status.classList
      .add("lose");

    timer.textContent =
      "💥";

    status.textContent =
      `💥 PLAYER ${currentPlayer} LOSE`;

    btn.disabled =
      true;

    /* 終了後はルールボタンを再度有効化 */
    openModalBtn.disabled =
      false;

    renderHistory();
}

/* ボタン押下 */
btn.addEventListener(
"click",()=>{

    /* START */
    if(!isRunning){

        addLog(
          "START",
          currentTime()
        );

        startTime =
          Date.now();

        isRunning =
          true;

        btn.textContent =
          "STOP";

        btn.classList
          .remove(
            "btn-start"
          );

        btn.classList
          .add(
            "btn-stop"
          );

        status.textContent =
          `プレイヤー${currentPlayer} 計測中`;

        /* ゲーム中はルールボタンを無効化 */
        openModalBtn.disabled =
          true;

        /* 超えた瞬間監視 */
        timerInterval =
          setInterval(()=>{

            if(
              currentTime()
              >=
              LIMIT_SECONDS
            ){
                lose();
            }

          },10);

        return;
    }

    /* STOP */
    const elapsed =
      (Date.now()
      - startTime)
      / 1000;

    totalTime += elapsed;

    addLog(
      "STOP",
      totalTime,
      elapsed
    );

    isRunning =
      false;

    clearInterval(
      timerInterval
    );

    btn.textContent =
      "START";

    btn.classList
      .remove(
        "btn-stop"
      );

    btn.classList
      .add(
        "btn-start"
      );

    /* 交代時（停止中）はルールボタンを有効化 */
    openModalBtn.disabled =
      false;

    /* プレイヤー交代 */
    currentPlayer =
      currentPlayer === 1
      ? 2
      : 1;

    status.textContent =
      `プレイヤー${currentPlayer} のターン`;
});

</script>

</body>
</html>
