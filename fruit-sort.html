<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>フルーツ仕分けゲーム</title>

<style>
*{box-sizing:border-box;touch-action:none;}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f7fb;
}

.container{
    width:min(95vw,1000px);
    margin:auto;
    padding:10px;
}

h1{
    text-align:center;
    margin:10px 0;
}

/* ===== ★統一ステータス ===== */
.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    margin-bottom:10px;
}

/* 全部同じサイズに統一 */
.stat-card{
    color:white;
    border-radius:16px;
    padding:10px;
    text-align:center;
    font-weight:bold;
}

.stat-card span{
    display:block;
    font-size:34px;
    margin-top:4px;
}

/* 色 */
.miss{background:#dc2626;}
.skip{background:#f59e0b;}
.combo{background:#16a34a;}

/* ボタン */
button{
    display:block;
    margin:0 auto 10px;
    padding:12px 20px;
    font-size:18px;
    border:none;
    border-radius:14px;
    background:#43a047;
    color:white;
}

/* ===== ゲーム ===== */
.game{
    position:relative;
    height:60vh;
    background:white;
    border-radius:18px;
    overflow:hidden;
    border:3px solid #ddd;
}

.belt{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:45%;
    background:repeating-linear-gradient(
        180deg,
        #666 0px,
        #666 25px,
        #999 25px,
        #999 50px
    );
    animation:beltMove 0.5s linear infinite;
}

@keyframes beltMove{
    from{background-position:0 0;}
    to{background-position:0 50px;}
}

.belt-ui{
    position:absolute;
    top:55px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 12px;
    font-weight:bold;
    color:white;
    z-index:5;
    pointer-events:none;
}

.belt-ui .time,
.belt-ui .score{
    background:rgba(0,0,0,0.5);
    padding:6px 10px;
    border-radius:10px;
}

.deadline{
    position:absolute;
    top:50%;
    width:100%;
    height:4px;
    background:red;
}

.trash{
    position:absolute;
    left:50%;
    top:62%;
    transform:translate(-50%,-50%);
    width:55px;
    height:70px;
    background:#444;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    color:white;
}

.box{
    position:absolute;
    width:110px;
    height:75px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
}

.left{left:10px;top:50%;transform:translateY(-50%);background:#ffd8e7;}
.right{right:10px;top:50%;transform:translateY(-50%);background:#d6ffd8;}
.bottom{bottom:10px;left:50%;transform:translateX(-50%);background:#fff3b0;}

.fruit{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    font-size:50px;
}
</style>
</head>

<body>

<div class="container">

<h1>🍌 フルーツ仕分けゲーム 🍓</h1>

<!-- ★統一UI -->
<div class="stats">

    <div class="stat-card miss">
        MISS
        <span id="miss">0</span>
    </div>

    <div class="stat-card skip">
        SKIP
        <span id="skip">0</span>
    </div>

    <div class="stat-card combo">
        COMBO
        <span id="combo">0</span>
    </div>

</div>

<button id="startBtn">開始</button>

<div class="game" id="game">

    <div class="belt-ui">
        <div class="time">TIME: <span id="time">30</span></div>
        <div class="score">SCORE: <span id="score">0</span></div>
    </div>

    <div class="belt"></div>
    <div class="deadline"></div>
    <div class="trash">🗑️</div>

    <div class="box left">🍓</div>
    <div class="box right">🍈</div>
    <div class="box bottom">🍌</div>

</div>

</div>

<script>

/* JSはそのまま（動作安定版） */

const game=document.getElementById("game");

const fruits=[
    {emoji:"🍌",dir:"down"},
    {emoji:"🍓",dir:"left"},
    {emoji:"🍈",dir:"right"}
];

let list=[];
let playing=false;

let score=0,miss=0,skip=0,combo=0;
let seconds=30;
let speed=2.5;

let spawn=null;
let timer=null;
let loopId=null;

/* START */
function start(){

    clearInterval(spawn);
    clearInterval(timer);
    cancelAnimationFrame(loopId);

    document.querySelectorAll(".fruit").forEach(e=>e.remove());

    list=[];
    score=0;
    miss=0;
    skip=0;
    combo=0;
    seconds=30;

    playing=true;
    update();

    spawn=setInterval(create,800);

    timer=setInterval(()=>{
        seconds--;
        update();
        if(seconds<=0) finish();
    },1000);

    loopId=requestAnimationFrame(loop);
}

function finish(){
    playing=false;
    clearInterval(spawn);
    clearInterval(timer);
    cancelAnimationFrame(loopId);
}

function create(){
    const f=fruits[Math.floor(Math.random()*3)];

    const el=document.createElement("div");
    el.className="fruit";
    el.textContent=f.emoji;
    el.style.top="-80px";

    game.appendChild(el);

    list.push({el,y:-80,dir:f.dir,fall:false});
}

function loop(){

    if(!playing) return;

    const deadline=game.clientHeight/2;
    const trash=document.querySelector(".trash");

    for(let i=0;i<list.length;i++){

        const f=list[i];
        if(f.fall) continue;

        f.y+=speed;
        f.el.style.top=f.y+"px";

        if(f.y>deadline){

            f.fall=true;

            miss++;
            score=Math.max(0,score-1);
            skip++;
            combo=0;

            const fr=f.el.getBoundingClientRect();
            const tr=trash.getBoundingClientRect();

            const dx=(tr.left+tr.width/2)-(fr.left+fr.width/2);
            const dy=(tr.top+tr.height/2)-(fr.top+fr.height/2);

            f.el.style.transition="0.6s";
            f.el.style.transform=`translate(${dx}px,${dy}px) scale(0.4)`;
            f.el.style.opacity="0";

            setTimeout(()=>f.el.remove(),600);
            list.splice(i,1);
            i--;
        }
    }

    update();
    loopId=requestAnimationFrame(loop);
}

function move(dir){

    if(!playing||!list.length)return;

    const f=list[0];

    if(f.dir===dir){

        score++;
        combo++;
        skip=0;

        const box=document.querySelector(
            dir==="down"?".bottom":
            dir==="left"?".left":".right"
        );

        const fr=f.el.getBoundingClientRect();
        const bx=box.getBoundingClientRect();

        const dx=(bx.left+bx.width/2)-(fr.left+fr.width/2);
        const dy=(bx.top+bx.height/2)-(fr.top+fr.height/2);

        f.el.style.transition="0.4s";
        f.el.style.transform=`translate(${dx}px,${dy}px) scale(1.3)`;
        f.el.style.opacity="0";

        setTimeout(()=>f.el.remove(),400);
        list.shift();

    }else{
        miss++;
        score=Math.max(0,score-1);
        combo=0;
    }

    update();
}

/* SWIPE */
let sx=0,sy=0;

game.addEventListener("touchstart",e=>{
    sx=e.touches[0].clientX;
    sy=e.touches[0].clientY;
},{passive:true});

game.addEventListener("touchend",e=>{
    const dx=e.changedTouches[0].clientX-sx;
    const dy=e.changedTouches[0].clientY-sy;

    if(Math.abs(dx)<30&&Math.abs(dy)<30)return;

    move(Math.abs(dx)>Math.abs(dy)
        ? (dx>0?"right":"left")
        : "down"
    );

},{passive:true});

function update(){
    document.getElementById("time").textContent=seconds;
    document.getElementById("score").textContent=score;
    document.getElementById("miss").textContent=miss;
    document.getElementById("skip").textContent=skip;
    document.getElementById("combo").textContent=combo;
}

document.getElementById("startBtn").onclick=start;

</script>

</body>
</html>
