<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"/>

<title>フルーツ仕分けゲーム</title>

<style>
*{
    box-sizing:border-box;
    touch-action:none;
}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f7fb;
}

.container{
    width:min(95vw,1000px);
    margin:auto;
    padding:10px;
}

h1{
    text-align:center;
    margin:10px 0;
    font-size:30px;
}

/* =====================
   SCORE
===================== */
.big-score{
    text-align:center;
    background:#16a34a;
    color:#fff;
    border-radius:22px;
    padding:14px;
    margin-bottom:10px;
    font-weight:bold;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.big-score .label{
    font-size:20px;
}

.big-score .value{
    font-size:58px;
    line-height:1;
}

/* =====================
   BUTTON
===================== */
button{
    display:block;
    margin:0 auto 10px;
    padding:12px 20px;
    font-size:18px;
    border:none;
    border-radius:14px;
    background:#43a047;
    color:#fff;
    cursor:pointer;
}

/* =====================
   GAME
===================== */
.game{
    position:relative;
    height:60vh;
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    border:3px solid #ddd;
}

.deadline{
    position:absolute;
    top:50%;
    width:100%;
    height:4px;
    background:red;
}

.trash{
    position:absolute;
    left:50%;
    top:62%;
    transform:translate(-50%,-50%);
    width:55px;
    height:70px;
    background:#444;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    color:#fff;
}

.box{
    position:absolute;
    width:110px;
    height:75px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
}

.left{
    left:10px;
    top:50%;
    transform:translateY(-50%);
    background:#ffd8e7;
}

.right{
    right:10px;
    top:50%;
    transform:translateY(-50%);
    background:#d6ffd8;
}

.bottom{
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    background:#fff3b0;
}

.fruit{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    font-size:50px;
    user-select:none;
}

/* =====================
   SCORE POPUP
===================== */
.score-popup{
    position:absolute;
    font-size:36px;
    font-weight:bold;
    color:#16a34a;
    pointer-events:none;
    z-index:999;
    animation:scorePop .7s ease-out forwards;
}

@keyframes scorePop{
    0%{
        opacity:0;
        transform:translate(-50%,0) scale(.7);
    }

    20%{
        opacity:1;
        transform:translate(-50%,-10px) scale(1.2);
    }

    100%{
        opacity:0;
        transform:translate(-50%,-60px) scale(1);
    }
}

/* =====================
   GAME OVER
===================== */
.game-over{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.75);
    backdrop-filter:blur(5px);

    display:flex;
    align-items:center;
    justify-content:center;

    opacity:0;
    visibility:hidden;

    transition:.35s;
    z-index:9999;
}

.game-over.show{
    opacity:1;
    visibility:visible;
}

.game-over-card{
    background:linear-gradient(
        180deg,
        #ffffff,
        #f3f4f6
    );

    width:min(85vw,340px);
    border-radius:28px;
    padding:30px 24px;
    text-align:center;

    transform:scale(.75);
    opacity:0;

    transition:.35s;

    box-shadow:
        0 15px 40px
        rgba(0,0,0,.35);
}

.game-over.show .game-over-card{
    transform:scale(1);
    opacity:1;
}

.go-title{
    font-size:44px;
    font-weight:900;
    color:#dc2626;
    letter-spacing:2px;
    animation:pulse .9s infinite;
}

.go-score-label{
    margin-top:18px;
    font-size:18px;
    color:#666;
}

.go-score{
    font-size:72px;
    font-weight:bold;
    color:#16a34a;
    margin:10px 0 24px;
}

.retry-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:18px;
    font-size:22px;
    font-weight:bold;
    color:white;
    background:linear-gradient(
        135deg,
        #16a34a,
        #22c55e
    );
}

.retry-btn:active{
    transform:scale(.96);
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="container">

<h1>フルーツ仕分けゲーム</h1>

<div class="big-score">
    <div class="label">
        SCORE
    </div>

    <div class="value" id="score">
        0
    </div>
</div>

<button id="startBtn">
    開始
</button>

<div class="game" id="game">

    <div class="deadline"></div>

    <div class="trash">
        🗑️
    </div>

    <div class="box left">
        🍓
    </div>

    <div class="box right">
        🍈
    </div>

    <div class="box bottom">
        🍌
    </div>

    <!-- GAME OVER -->
    <div class="game-over" id="gameOver">

        <div class="game-over-card">

            <div class="go-title">
                GAME OVER
            </div>

            <div class="go-score-label">
                SCORE
            </div>

            <div class="go-score"
                 id="finalScore">
                0
            </div>

            <button class="retry-btn"
                    onclick="start()">
                もう一回
            </button>

        </div>

    </div>

</div>

</div>

<script>
const game =
    document.getElementById(
        "game"
    );

const fruits = [
    {
        emoji:"🍌",
        dir:"down"
    },
    {
        emoji:"🍓",
        dir:"left"
    },
    {
        emoji:"🍈",
        dir:"right"
    }
];

let list = [];
let playing = false;

let score = 0;
let speed = 2.5;

let spawnRate = 900;
const minSpawnRate = 250;

let spawn = null;
let loopId = null;
let difficultyTimer = null;

/* =====================
   START
===================== */
function start(){

    clearInterval(spawn);
    clearInterval(
        difficultyTimer
    );

    cancelAnimationFrame(
        loopId
    );

    document
        .querySelectorAll(
            ".fruit"
        )
        .forEach(e=>e.remove());

    list = [];
    score = 0;
    playing = true;
    spawnRate = 900;

    document
        .getElementById(
            "gameOver"
        )
        .classList.remove(
            "show"
        );

    update();

    spawn =
        setInterval(
            create,
            spawnRate
        );

    difficultyTimer =
        setInterval(()=>{

            spawnRate =
                Math.max(
                    minSpawnRate,
                    spawnRate - 50
                );

            clearInterval(
                spawn
            );

            spawn =
                setInterval(
                    create,
                    spawnRate
                );

        },3000);

    loopId =
        requestAnimationFrame(
            loop
        );
}

/* =====================
   GAME OVER
===================== */
function finish(){

    playing = false;

    clearInterval(spawn);
    clearInterval(
        difficultyTimer
    );

    cancelAnimationFrame(
        loopId
    );

    document
        .getElementById(
            "finalScore"
        )
        .textContent =
        score;

    document
        .getElementById(
            "gameOver"
        )
        .classList.add(
            "show"
        );
}

/* =====================
   CREATE
===================== */
function create(){

    const f =
        fruits[
            Math.floor(
                Math.random()*3
            )
        ];

    const el =
        document.createElement(
            "div"
        );

    el.className =
        "fruit";

    el.textContent =
        f.emoji;

    el.style.top =
        "-80px";

    game.appendChild(el);

    list.push({
        el,
        y:-80,
        dir:f.dir,
        fall:false
    });
}

/* =====================
   LOOP
===================== */
function loop(){

    if(!playing)
        return;

    const deadline =
        game.clientHeight / 2;

    const trash =
        document.querySelector(
            ".trash"
        );

    for(let i=0;
        i<list.length;
        i++){

        const f =
            list[i];

        if(f.fall)
            continue;

        f.y += speed;

        f.el.style.top =
            f.y + "px";

        if(
            f.y > deadline
        ){

            f.fall = true;

            const fr =
                f.el
                .getBoundingClientRect();

            const tr =
                trash
                .getBoundingClientRect();

            const dx =
                (
                    tr.left +
                    tr.width/2
                )
                -
                (
                    fr.left +
                    fr.width/2
                );

            const dy =
                (
                    tr.top +
                    tr.height/2
                )
                -
                (
                    fr.top +
                    fr.height/2
                );

            f.el.style.transition =
                "0.5s";

            f.el.style.transform =
                `translate(${dx}px,${dy}px) scale(0.4)`;

            f.el.style.opacity =
                "0";

            setTimeout(()=>{
                f.el.remove();
            },500);

            finish();
            return;
        }
    }

    loopId =
        requestAnimationFrame(
            loop
        );
}

/* =====================
   SCORE POPUP
===================== */
function showScorePopup(
    x,
    y,
    text
){

    const popup =
        document.createElement(
            "div"
        );

    popup.className =
        "score-popup";

    popup.textContent =
        text;

    popup.style.left =
        x + "px";

    popup.style.top =
        y + "px";

    game.appendChild(
        popup
    );

    setTimeout(()=>{
        popup.remove();
    },700);
}

/* =====================
   MOVE
===================== */
function move(dir){

    if(
        !playing ||
        !list.length
    ) return;

    const f =
        list[0];

    if(
        f.dir === dir
    ){

        score++;

        const rect =
            f.el
            .getBoundingClientRect();

        const gameRect =
            game
            .getBoundingClientRect();

        showScorePopup(
            rect.left
            - gameRect.left
            + rect.width/2,

            rect.top
            - gameRect.top,

            score
        );

        const box =
            document.querySelector(
                dir==="down"
                ? ".bottom"
                : dir==="left"
                ? ".left"
                : ".right"
            );

        const fr =
            f.el
            .getBoundingClientRect();

        const bx =
            box
            .getBoundingClientRect();

        const dx =
            (
                bx.left +
                bx.width/2
            )
            -
            (
                fr.left +
                fr.width/2
            );

        const dy =
            (
                bx.top +
                bx.height/2
            )
            -
            (
                fr.top +
                fr.height/2
            );

        f.el.style.transition =
            "0.4s";

        f.el.style.transform =
            `translate(${dx}px,${dy}px) scale(1.3)`;

        f.el.style.opacity =
            "0";

        setTimeout(()=>{
            f.el.remove();
        },400);

        list.shift();

        update();
    }
}

/* =====================
   SWIPE
===================== */
let sx = 0;
let sy = 0;

game.addEventListener(
    "touchstart",
    e=>{

        sx =
            e.touches[0]
            .clientX;

        sy =
            e.touches[0]
            .clientY;
    },
    {passive:true}
);

game.addEventListener(
    "touchend",
    e=>{

        const dx =
            e.changedTouches[0]
            .clientX - sx;

        const dy =
            e.changedTouches[0]
            .clientY - sy;

        if(
            Math.abs(dx) < 30 &&
            Math.abs(dy) < 30
        ) return;

        move(
            Math.abs(dx) >
            Math.abs(dy)

            ? (
                dx > 0
                ? "right"
                : "left"
            )

            : "down"
        );
    },
    {passive:true}
);

/* =====================
   UPDATE
===================== */
function update(){

    document
        .getElementById(
            "score"
        )
        .textContent =
        score;
}

document
    .getElementById(
        "startBtn"
    )
    .onclick =
    start;
</script>

</body>
</html>
