<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>フルーツ仕分けゲーム（スワイプ版）</title>

<style>
*{
    box-sizing:border-box;
    touch-action:none;
}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f7fb;
    overflow:hidden;
}

.container{
    width:min(95vw,1000px);
    margin:auto;
    padding:10px;
}

h1{
    text-align:center;
    font-size:clamp(18px,4vw,28px);
    margin:10px 0;
}

.stats{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    font-size:clamp(12px,3.5vw,20px);
    font-weight:bold;
    margin-bottom:10px;
    gap:5px;
}

button{
    display:block;
    margin:0 auto 10px;
    padding:12px 20px;
    font-size:18px;
    border:none;
    border-radius:14px;
    background:#43a047;
    color:white;
}

.game{
    position:relative;
    height:60vh;
    min-height:360px;
    background:white;
    border-radius:18px;
    overflow:hidden;
    border:3px solid #ddd;
}

.belt{
    position:absolute;
    top:50%;
    left:0;
    transform:translateY(-50%);
    width:50%;
    height:120px;
    background:repeating-linear-gradient(
        90deg,
        #777 0px,#777 30px,
        #999 30px,#999 60px
    );
    animation:beltMove .4s linear infinite;
}

@keyframes beltMove{
    from{background-position:0 0;}
    to{background-position:60px 0;}
}

.deadline{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:5px;
    height:100%;
    background:red;
}

/* 🔧 ゴミ箱（縮小版） */
.trash{
    position:absolute;
    left:calc(50% + 10px);
    top:50%;
    transform:translateY(-50%);
    width:60px;
    height:75px;
    background:#444;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    color:white;
}

.box{
    position:absolute;
    width:120px;
    height:80px;
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    font-weight:bold;
    border:4px solid rgba(0,0,0,.15);
}

.top{
    top:10px;
    left:50%;
    transform:translateX(-50%);
    background:#fff3b0;
}

.right{
    right:10px;
    top:50%;
    transform:translateY(-50%);
    background:#ffd8e7;
}

.bottom{
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    background:#d6ffd8;
}

.fruit{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:50px;
    user-select:none;
    pointer-events:none;
}

.message{
    text-align:center;
    font-size:20px;
    font-weight:bold;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>🍌 フルーツ仕分けゲーム 🍓（スワイプ版）</h1>

<div class="stats">
    <div>⏰ <span id="time">30</span></div>
    <div>⭕ <span id="score">0</span></div>
    <div>❌ <span id="miss">0</span></div>
    <div>🚫 <span id="skip">0</span></div>
    <div>🔥 <span id="combo">0</span></div>
</div>

<button id="startBtn">開始</button>

<div class="game" id="game">

    <div class="belt"></div>
    <div class="deadline"></div>
    <div class="trash">🗑️</div>

    <div class="box top">🍌</div>
    <div class="box right">🍓</div>
    <div class="box bottom">🍈</div>

</div>

<div class="message" id="message"></div>

</div>

<script>

const game = document.getElementById("game");

const timeEl = document.getElementById("time");
const scoreEl = document.getElementById("score");
const missEl = document.getElementById("miss");
const skipEl = document.getElementById("skip");
const comboEl = document.getElementById("combo");
const messageEl = document.getElementById("message");

const fruits = [
    {emoji:"🍌",dir:"up"},
    {emoji:"🍓",dir:"right"},
    {emoji:"🍈",dir:"down"}
];

let list = [];
let playing = false;

let score = 0, miss = 0, skip = 0, combo = 0;
let skipCombo = 0;

let speed = 2.8;
let seconds = 30;

const baseSpawnRate = 700;
const minSpawnRate = 400;

let spawnRate = baseSpawnRate;
let spawn, timer;

/* ===================== */
function start(){

    clearInterval(spawn);
    clearInterval(timer);

    document.querySelectorAll(".fruit").forEach(e=>e.remove());

    list = [];
    score = miss = skip = combo = 0;
    skipCombo = 0;

    speed = 2.8;
    seconds = 30;

    spawnRate = baseSpawnRate;
    playing = true;

    update();

    spawn = setInterval(create, spawnRate);

    timer = setInterval(()=>{
        seconds--;
        timeEl.textContent = seconds;
        speed += 0.05;

        if(seconds <= 0) finish();
    },1000);

    requestAnimationFrame(loop);
}

function finish(){
    playing = false;
    clearInterval(spawn);
    clearInterval(timer);
    messageEl.textContent = `終了！スコア:${score}`;
}

function create(){
    const f = fruits[Math.floor(Math.random()*3)];

    const el = document.createElement("div");
    el.className = "fruit";
    el.textContent = f.emoji;
    el.style.left = "-80px";

    game.appendChild(el);

    list.push({el, x:-80, dir:f.dir, fall:false});
}

function loop(){

    if(!playing) return;

    const deadline = game.clientWidth / 2;
    const trash = document.querySelector(".trash");

    list.forEach((f,i)=>{

        if(f.fall) return;

        f.x += speed;
        f.el.style.left = f.x + "px";

        if(f.x > deadline){

            f.fall = true;

            skip++;
            combo = 0;
            skipCombo++;

            score = Math.max(0, score - 1);

            if(skipCombo >= 3){
                spawnRate = baseSpawnRate;
                skipCombo = 0;
                resetSpawn();
            }

            update();

            const fr = f.el.getBoundingClientRect();
            const tr = trash.getBoundingClientRect();

            const dx = (tr.left + tr.width/2) - (fr.left + fr.width/2);
            const dy = (tr.top + tr.height/2) - (fr.top + fr.height/2);

            f.el.style.transition = "0.6s";
            f.el.style.transform = `translate(${dx}px,${dy}px) scale(0.4)`;
            f.el.style.opacity = "0";

            setTimeout(()=>f.el.remove(),600);

            list.splice(i,1);
        }
    });

    requestAnimationFrame(loop);
}

function move(dir){

    if(!playing || !list.length) return;

    const f = list[0];

    if(f.dir === dir){

        score++;
        combo++;
        skipCombo = 0;

        messageEl.textContent = "⭕ OK";

        const targetBox =
            document.querySelector(
                dir==="up"?".top":
                dir==="right"?".right":".bottom"
            );

        const fr = f.el.getBoundingClientRect();
        const bx = targetBox.getBoundingClientRect();

        const dx = (bx.left + bx.width/2) - (fr.left + fr.width/2);
        const dy = (bx.top + bx.height/2) - (fr.top + fr.height/2);

        f.el.style.transition = "0.4s";
        f.el.style.transform = `translate(${dx}px,${dy}px) scale(1.3)`;
        f.el.style.opacity = "0";

        setTimeout(()=>f.el.remove(),400);

        list.shift();

        if(combo % 25 === 0){
            seconds += 3;
        }

        spawnRate = Math.max(minSpawnRate, spawnRate - 25);
        resetSpawn();

    }else{

        miss++;
        combo = 0;
        skipCombo = 0;

        score = Math.max(0, score - 1);

        messageEl.textContent = "❌ ミス";
    }

    update();
}

function update(){
    scoreEl.textContent = score;
    missEl.textContent = miss;
    skipEl.textContent = skip;
    comboEl.textContent = combo;
    timeEl.textContent = seconds;
}

function resetSpawn(){
    clearInterval(spawn);
    spawn = setInterval(create, spawnRate);
}

/* スワイプ操作 */
let touchStartX = 0;
let touchStartY = 0;

game.addEventListener("touchstart", e=>{
    const t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
}, {passive:true});

game.addEventListener("touchend", e=>{
    const t = e.changedTouches[0];

    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;

    const absX = Math.abs(dx);
    const absY = Math.abs(dy);

    const threshold = 40;

    if(absX < threshold && absY < threshold) return;

    if(absY > absX){
        if(dy < 0) move("up");
        else move("down");
    }else{
        if(dx > 0) move("right");
    }

}, {passive:true});

document.getElementById("startBtn").onclick = start;

</script>

</body>
</html>
