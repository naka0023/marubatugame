<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ペンタロール</title>
  <style>
    *{
  box-sizing:border-box;
}

body{
  font-family:'Yusei Magic',sans-serif;

  margin:0;
  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  padding:20px;

  color:white;

  background:
    radial-gradient(circle at top,
    #1f2937,#0d1117);
}

/* ガラス風コンテナ */
.container{

  width:100%;
  max-width:700px;

  text-align:center;

  background:
    rgba(255,255,255,.08);

  border:
    1px solid rgba(255,255,255,.08);

  border-radius:32px;

  padding:28px;

  backdrop-filter:blur(14px);

  box-shadow:
    0 0 30px rgba(0,255,255,.08);
}

h1{
  margin:0 0 12px;
  font-size:32px;
}

/* チュートリアルを開くボタン */
#tutorial-open-btn {
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: #9ca3af;
  padding: 6px 16px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 14px;
  margin-bottom: 24px;
  transition: .2s;
}

#tutorial-open-btn:hover {
  background: rgba(255, 255, 255, 0.2);
  color: white;
  box-shadow: 0 0 12px rgba(255,255,255,0.1);
}

/* ボード */
#board-container{

  display:grid;

  grid-template-columns:
    40px repeat(6,60px) 40px;

  grid-template-rows:
    40px repeat(6,60px) 40px;

  gap:8px;

  justify-content:center;
}

/* マス */
.cell{

  width:60px;
  height:60px;

  border-radius:18px;

  background:
    rgba(255,255,255,.06);

  border:
    1px solid rgba(255,255,255,.08);

  display:flex;
  align-items:center;
  justify-content:center;

  transition:.2s;
}

.cell:hover{
  box-shadow:
    0 0 18px rgba(0,255,255,.18);
}

/* 勝利セル */
.highlight{

  background:
    linear-gradient(
      135deg,
      rgba(245,158,11,.35),
      rgba(239,68,68,.25)
    ) !important;

  border:
    2px solid #ff8a65;

  box-shadow:
    0 0 18px rgba(255,120,80,.5);
}

/* 石 */
.ball{
  width:38px;
  height:38px;
  border-radius:50%;
}

.black{
  background:
    linear-gradient(
      135deg,
      #ef4444,
      #f59e0b
    );

  box-shadow:
    0 0 14px rgba(239,68,68,.5);
}

.white{
  background:
    linear-gradient(
      135deg,
      #f3f4f6,
      #9ca3af
    );

  border:
    2px solid rgba(255,255,255,.3);
}

/* 矢印ボタン */
.insert-button{

  width:40px;
  height:40px;

  border:none;
  border-radius:14px;

  cursor:pointer;

  color:white;
  font-size:18px;

  background:
    linear-gradient(
      135deg,
      #8b5cf6,
      #2563eb
    );

  transition:.2s;
}

.insert-button:hover{
  transform:translateY(-2px);

  box-shadow:
    0 0 18px rgba(99,102,241,.5);
}

.insert-button:active{
  transform:scale(.95);
}

/* ステータス */
#status{
  margin-top:22px;
  font-size:20px;
}

/* リセット */
#reset-button{

  margin-top:20px;

  padding:14px 22px;

  border:none;
  border-radius:20px;

  font-size:16px;

  cursor:pointer;

  color:white;

  background:
    linear-gradient(
      135deg,
      #8b5cf6,
      #2563eb
    );

  transition:.2s;
}

#reset-button:hover{
  transform:translateY(-2px);

  box-shadow:
    0 0 20px rgba(99,102,241,.4);
}

#reset-button:active{
  transform:scale(.97);
}

/* チュートリアルモーダル */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(8px);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s ease;
}

.modal-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.modal-content {
  background: rgba(31, 41, 55, 0.85);
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 0 40px rgba(139, 92, 246, 0.2);
  padding: 30px;
  border-radius: 24px;
  max-width: 500px;
  width: 90%;
  text-align: left;
  transform: scale(0.9);
  transition: transform .3s ease;
}

.modal-overlay.active .modal-content {
  transform: scale(1);
}

.modal-content h2 {
  margin-top: 0;
  font-size: 24px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  padding-bottom: 10px;
  color: #ff8a65;
}

.modal-content ul {
  padding-left: 20px;
  line-height: 1.6;
}

.modal-content li {
  margin-bottom: 12px;
}

#modal-close-btn {
  display: block;
  width: 100%;
  margin-top: 24px;
  padding: 12px;
  border: none;
  border-radius: 16px;
  background: linear-gradient(135deg, #8b5cf6, #2563eb);
  color: white;
  cursor: pointer;
  font-size: 16px;
  transition: .2s;
}

/* スマホ */
@media(max-width:600px){

  .container{
    padding:20px;
  }

  h1{
    font-size:28px;
  }

  #board-container{

    grid-template-columns:
      34px repeat(6,48px) 34px;

    grid-template-rows:
      34px repeat(6,48px) 34px;

    gap:6px;
  }

  .cell{
    width:48px;
    height:48px;
  }

  .ball{
    width:28px;
    height:28px;
  }

  .insert-button{
    width:34px;
    height:34px;
    font-size:14px;
  }

  #reset-button{
    width:100%;
  }
}
  </style>
</head>
<body>
  <div class="container">

    <header class="header-area">
      <h1>🎲 ペンタロール</h1>
      <button id="tutorial-open-btn">❓ 遊び方を見る</button>
    </header>

    <main class="game-area">
      <div id="board-container"></div>
    </main>

    <footer class="status-area">
      <div id="status">オレンジのターンです</div>

      <button id="reset-button">
        リセット
      </button>
    </footer>

  </div>

  <div id="tutorial-modal" class="modal-overlay">
    <div class="modal-content">
      <h2>🎮 ペンタロールの遊び方</h2>
      <ul>
        <li><strong>ルール：</strong>オレンジと白の2手番に分かれて交互にボールを盤面に滑り込ませるゲームです。</li>
        <li><strong>操作方法：</strong>盤面の外側にある青紫の矢印ボタン（↓ ↑ → ←）を押すと、その列の端から自分のボールが1つ挿入されます。</li>
        <li><strong>押し出し：</strong>すでにボールが置かれている列に新しく挿入すると、中にあるすべてのボールが奥へ1マスずつスライドして押し出されます。</li>
        <li><strong>勝利条件：</strong>縦・横・斜めのいずれかの直線上に、自分のボールを<strong>5つ連続</strong>で並べたプレイヤーの勝利となります！</li>
      </ul>
      <button id="modal-close-btn">ゲームを始める</button>
    </div>
  </div>

  <script>
    const SIZE = 6;
    const board = Array(SIZE).fill().map(() => Array(SIZE).fill(null));
    let currentPlayer = 'black';
    let isGameOver = false; // 勝敗決定後の操作をロックするフラグ
    const boardContainer = document.getElementById('board-container');
    const statusElement = document.getElementById('status');

    function renderBoard(highlightCells = []) {
      boardContainer.innerHTML = '';
      for (let r = -1; r <= SIZE; r++) {
        for (let c = -1; c <= SIZE; c++) {
          if (r === -1 && c >= 0 && c < SIZE) {
            const btn = document.createElement('button');
            btn.textContent = '↓';
            btn.className = 'insert-button';
            btn.onclick = () => insertBall('top', c);
            boardContainer.appendChild(btn);
          } else if (r === SIZE && c >= 0 && c < SIZE) {
            const btn = document.createElement('button');
            btn.textContent = '↑';
            btn.className = 'insert-button';
            btn.onclick = () => insertBall('bottom', c);
            boardContainer.appendChild(btn);
          } else if (c === -1 && r >= 0 && r < SIZE) {
            const btn = document.createElement('button');
            btn.textContent = '→';
            btn.className = 'insert-button';
            btn.onclick = () => insertBall('left', r);
            boardContainer.appendChild(btn);
          } else if (c === SIZE && r >= 0 && r < SIZE) {
            const btn = document.createElement('button');
            btn.textContent = '←';
            btn.className = 'insert-button';
            btn.onclick = () => insertBall('right', r);
            boardContainer.appendChild(btn);
          } else if (r >= 0 && r < SIZE && c >= 0 && c < SIZE) {
            const cell = document.createElement('div');
            cell.classList.add('cell');
            if (highlightCells.some(([hr, hc]) => hr === r && hc === c)) {
              cell.classList.add('highlight');
            }
            if (board[r][c]) {
              const ball = document.createElement('div');
              ball.classList.add('ball', board[r][c]);
              cell.appendChild(ball);
            }
            boardContainer.appendChild(cell);
          } else {
            const spacer = document.createElement('div');
            spacer.style.width = '30px';
            spacer.style.height = '30px';
            boardContainer.appendChild(spacer);
          }
        }
      }
    }

    function insertBall(direction, index) {
      if (isGameOver) return; // ゲーム終了後は操作不可

      let canInsert = false;
      if (direction === 'top') {
        for (let r = 0; r < SIZE; r++) {
          if (board[r][index] === null) {
            for (let k = r; k > 0; k--) {
              board[k][index] = board[k - 1][index];
            }
            board[0][index] = currentPlayer;
            canInsert = true;
            break;
          }
        }
      } else if (direction === 'bottom') {
        for (let r = SIZE - 1; r >= 0; r--) {
          if (board[r][index] === null) {
            for (let k = r; k < SIZE - 1; k++) {
              board[k][index] = board[k + 1][index];
            }
            board[SIZE - 1][index] = currentPlayer;
            canInsert = true;
            break;
          }
        }
      } else if (direction === 'left') {
        for (let c = 0; c < SIZE; c++) {
          if (board[index][c] === null) {
            for (let k = c; k > 0; k--) {
              board[index][k] = board[index][k - 1];
            }
            board[index][0] = currentPlayer;
            canInsert = true;
            break;
          }
        }
      } else if (direction === 'right') {
        for (let c = SIZE - 1; c >= 0; c--) {
          if (board[index][c] === null) {
            for (let k = c; k < SIZE - 1; k++) {
              board[index][k] = board[index][k + 1];
            }
            board[index][SIZE - 1] = currentPlayer;
            canInsert = true;
            break;
          }
        }
      }

      if (!canInsert) {
        alert('このラインにはこれ以上ボールを挿入できません');
        return;
      }

      const winCells = checkWin(currentPlayer);
      renderBoard(winCells);

      if (winCells.length > 0) {
        statusElement.textContent = `${currentPlayer === 'black' ? 'オレンジ' : '白'}の勝ち！`;
        isGameOver = true;
      } else {
        currentPlayer = currentPlayer === 'black' ? 'white' : 'black';
        statusElement.textContent = `${currentPlayer === 'black' ? 'オレンジ' : '白'}のターンです`;
      }
    }

    function checkWin(player) {
      const inARow = 5;
      const directions = [
        [0, 1], [1, 0], [1, 1], [-1, 1]
      ];
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (board[r][c] !== player) continue;
          for (const [dr, dc] of directions) {
            let cells = [[r, c]];
            for (let step = 1; step < inARow; step++) {
              const nr = r + dr * step;
              const nc = c + dc * step;
              if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE || board[nr][nc] !== player) break;
              cells.push([nr, nc]);
            }
            if (cells.length === inARow) return cells;
          }
        }
      }
      return [];
    }

    function resetGame() {
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          board[r][c] = null;
        }
      }
      currentPlayer = 'black';
      isGameOver = false;
      statusElement.textContent = 'オレンジのターンです';
      renderBoard();
    }

    // モーダルの開閉制御
    const modal = document.getElementById('tutorial-modal');
    const openBtn = document.getElementById('tutorial-open-btn');
    const closeBtn = document.getElementById('modal-close-btn');

    openBtn.addEventListener('click', () => modal.classList.add('active'));
    closeBtn.addEventListener('click', () => modal.classList.remove('active'));
    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.classList.remove('active');
    });

    document.getElementById('reset-button').addEventListener('click', resetGame);

    renderBoard();
  </script>
</body>
</html>
